<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masculinity on Your Own Terms</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;0,900;1,300;1,500;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; }
body { background:#f8faff; }

/* ── Background ── */
.bg {
  position:fixed; inset:0; z-index:0;
  background:linear-gradient(160deg,#f0f4ff 0%,#fdf8f0 50%,#f0fdf8 100%);
}
.bg-blob { position:absolute; border-radius:50%; filter:blur(88px); will-change:transform; }
.bb1 { width:480px;height:480px;background:#93c5fd;opacity:0.35;top:-140px;left:-120px; animation:bv1 20s ease-in-out infinite alternate; }
.bb2 { width:400px;height:400px;background:#86efac;opacity:0.3;bottom:-90px;right:-90px; animation:bv2 24s ease-in-out infinite alternate; }
.bb3 { width:320px;height:320px;background:#fde68a;opacity:0.38;top:32%;right:-55px; animation:bv1 17s ease-in-out infinite alternate-reverse; }
.bb4 { width:260px;height:260px;background:#c4b5fd;opacity:0.32;bottom:14%;left:-45px; animation:bv2 19s ease-in-out infinite alternate; }
.bb5 { width:280px;height:280px;background:#fda4af;opacity:0.28;top:52%;left:32%; animation:bv1 15s ease-in-out infinite alternate; }
.bb6 { width:220px;height:220px;background:#6ee7b7;opacity:0.25;top:8%;right:22%; animation:bv2 21s ease-in-out infinite alternate-reverse; }
@keyframes bv1 { from{transform:translate(0,0)} to{transform:translate(26px,18px)} }
@keyframes bv2 { from{transform:translate(0,0)} to{transform:translate(-20px,-15px)} }

/* ── Stage ── */
.stage {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:1rem 1.2rem; gap:0.8rem;
}

/* ── Progress ── */
.prog-wrap { width:100%; max-width:440px; display:flex; align-items:center; gap:10px; }
.prog-track { flex:1; height:4px; background:rgba(0,0,0,0.07); border-radius:100px; overflow:hidden; }
.prog-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,#60a5fa,#34d399,#fbbf24,#f472b6); transition:width 0.6s cubic-bezier(0.22,1,0.36,1); }
.prog-label { font-size:0.74rem; font-weight:600; color:rgba(59,130,246,0.5); min-width:36px; text-align:right; letter-spacing:0.04em; }

/* ── Card stack ── */
.card-stack {
  width:100%; max-width:440px;
  position:relative;
  height:clamp(500px, 72vh, 600px);
}

.card {
  position:absolute; inset:0;
  border-radius:28px;
  display:flex; flex-direction:column;
  box-shadow:0 16px 40px rgba(0,0,0,0.1), 0 4px 14px rgba(0,0,0,0.06);
  transition:transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
  will-change:transform; overflow:hidden; user-select:none; cursor:grab;
}
.card.hidden  { opacity:0; transform:translateX(115%) rotate(8deg); pointer-events:none; }
.card.active  { opacity:1; transform:translateX(0) rotate(0); z-index:5; }
.card.prev    { opacity:0; transform:translateX(-115%) rotate(-8deg); pointer-events:none; }
.card.behind1 { opacity:0.55; transform:scale(0.93) translateY(14px); z-index:4; pointer-events:none; }
.card.behind2 { opacity:0.3;  transform:scale(0.87) translateY(26px); z-index:3; pointer-events:none; }
.card.swiping { transition:none; }

/* Light pastel card gradients */
.t1  { background:linear-gradient(145deg,#eff6ff,#dbeafe,#bfdbfe); }
.t2  { background:linear-gradient(145deg,#f0fdf4,#dcfce7,#bbf7d0); }
.t3  { background:linear-gradient(145deg,#fffbeb,#fef3c7,#fde68a); }
.t4  { background:linear-gradient(145deg,#fdf4ff,#fae8ff,#f0abfc); }
.t5  { background:linear-gradient(145deg,#fff0f2,#fce7eb,#fda4af); }
.t6  { background:linear-gradient(145deg,#f0fdfa,#ccfbf1,#99f6e4); }
.t7  { background:linear-gradient(145deg,#f5f3ff,#ede9fe,#ddd6fe); }
.t8  { background:linear-gradient(145deg,#fff9e6,#fef3c7,#fed7aa); }
.t9  { background:linear-gradient(145deg,#f0f9ff,#e0f2fe,#bae6fd); }
.t10 { background:linear-gradient(145deg,#fdf2f8,#fce7f3,#ede9fe); }

/* Deco */
.cdeco { position:absolute; border-radius:50%; pointer-events:none; background:rgba(255,255,255,0.45); }
.cd1 { width:240px;height:240px;top:-80px;right:-80px; }
.cd2 { width:160px;height:160px;bottom:-55px;left:-55px; }

/* Band */
.card-band { height:5px; width:100%; flex-shrink:0; }

/* Body */
.card-body-wrap {
  padding:1.5rem 1.8rem 1.5rem;
  display:flex; flex-direction:column; flex:1; overflow:hidden;
}

.card-eye {
  font-size:0.67rem; font-weight:700; letter-spacing:0.14em;
  text-transform:uppercase; margin-bottom:0.3rem;
  display:flex; align-items:center; gap:6px; color:rgba(0,0,0,0.4);
}
.card-title {
  font-family:'Fraunces',serif; font-weight:900;
  font-size:clamp(1.3rem,3.8vw,1.65rem); line-height:1.2;
  margin-bottom:0.75rem; color:#1a1a2e;
}
.card-title em { font-style:italic; font-weight:700; color:rgba(0,0,30,0.55); }
.card-text {
  font-size:0.9rem; font-weight:400; line-height:1.78;
  color:rgba(0,0,0,0.6); margin-bottom:0.75rem; flex:1;
}

/* Scenarios */
.scenarios { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:0.75rem; }
.scenario {
  border-radius:14px; padding:0.75rem 1rem;
  display:flex; align-items:flex-start; gap:10px;
  background:rgba(255,255,255,0.5);
  border:1px solid rgba(255,255,255,0.7);
  border-left:3px solid rgba(0,0,0,0.12);
  animation:scIn 0.45s ease both;
}
.scenario:nth-child(1){ animation-delay:0.08s; }
.scenario:nth-child(2){ animation-delay:0.2s; }
.scenario:nth-child(3){ animation-delay:0.32s; }
@keyframes scIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
.sc-ic { font-size:1.1rem; flex-shrink:0; margin-top:1px; }
.sc-text { font-size:0.87rem; font-weight:700; line-height:1.5; color:#1a1a2e; }
.sc-sub  { font-size:0.78rem; font-weight:300; color:rgba(0,0,0,0.5); margin-top:2px; line-height:1.45; }

/* Steps */
.steps { display:flex; flex-direction:column; gap:0.45rem; margin-bottom:0.75rem; }
.step {
  display:flex; align-items:center; gap:9px;
  border-radius:12px; padding:0.6rem 0.9rem;
  background:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.7);
  font-size:0.87rem; font-weight:600; line-height:1.5; color:#1a1a2e;
  animation:scIn 0.4s ease both;
}
.step:nth-child(1){ animation-delay:0.05s; }
.step:nth-child(2){ animation-delay:0.15s; }
.step:nth-child(3){ animation-delay:0.25s; }
.step:nth-child(4){ animation-delay:0.35s; }
.step-ic { font-size:1rem; flex-shrink:0; }

/* Affirm rows */
.affirm-rows { display:flex; flex-direction:column; gap:0.55rem; margin-bottom:0.75rem; }
.affirm-row {
  border-left:4px solid rgba(0,0,0,0.15);
  border-radius:0 16px 16px 0;
  padding:0.9rem 1.2rem;
  font-family:'Fraunces',serif; font-style:italic; font-weight:700;
  font-size:1.06rem; line-height:1.45;
  background:rgba(255,255,255,0.45); color:#1a1a2e;
  opacity:0; animation:scIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
}
.affirm-row:nth-child(1){ animation-delay:0.1s; }
.affirm-row:nth-child(2){ animation-delay:0.26s; }
.affirm-row:nth-child(3){ animation-delay:0.42s; }

/* Quote strip */
.quote-strip {
  border-radius:16px; padding:1rem 1.2rem;
  background:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.7);
  border-left:4px solid rgba(0,0,0,0.15); margin-bottom:0.75rem;
  animation:fadeSlide 0.5s ease both 0.15s;
}
@keyframes fadeSlide { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.qs-mark { font-family:'Fraunces',serif; font-size:2.5rem; line-height:0.4; opacity:0.2; color:#1a1a2e; display:block; margin-bottom:0.35rem; }
.qs-text { font-family:'Fraunces',serif; font-style:italic; font-size:1.05rem; font-weight:600; line-height:1.55; color:#1a1a2e; }
.qs-attr { font-size:0.72rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-top:0.4rem; color:rgba(0,0,0,0.35); }

/* Notice */
.notice {
  border-radius:14px; padding:0.85rem 1rem;
  background:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.7);
  font-size:0.86rem; font-style:italic; font-weight:400;
  color:#1a1a2e; line-height:1.6; margin-bottom:0.75rem;
  animation:fadeSlide 0.5s ease both 0.2s;
}

/* Myth vs truth grid */
.myth-grid { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:0.75rem; }
.myth-row {
  display:grid; grid-template-columns:1fr 1fr; gap:0.4rem;
  animation:scIn 0.45s ease both;
}
.myth-row:nth-child(1){ animation-delay:0.06s; }
.myth-row:nth-child(2){ animation-delay:0.18s; }
.myth-row:nth-child(3){ animation-delay:0.3s; }
.myth-box {
  border-radius:12px; padding:0.6rem 0.8rem;
  font-size:0.8rem; font-weight:600; line-height:1.45;
  text-align:center;
}
.myth-box.myth { background:rgba(239,68,68,0.12); color:#991b1b; border:1px solid rgba(239,68,68,0.2); text-decoration:line-through; opacity:0.7; }
.myth-box.truth { background:rgba(34,197,94,0.12); color:#14532d; border:1px solid rgba(34,197,94,0.2); }
.myth-label { font-size:0.62rem; font-weight:800; letter-spacing:0.12em; text-transform:uppercase; text-align:center; margin-bottom:0.25rem; }
.myth-label.m { color:rgba(239,68,68,0.6); }
.myth-label.t { color:rgba(34,197,94,0.7); }

/* Breath orb */
.breath-center { display:flex; align-items:center; justify-content:center; margin-bottom:1.2rem; }
.breath-orb { position:relative; width:100px; height:100px; display:flex; align-items:center; justify-content:center; }
.bor { position:absolute; border-radius:50%; border:1.5px solid rgba(0,0,0,0.12); animation:breathP 4s ease-in-out infinite; }
.bor1 { width:60px; height:60px; }
.bor2 { width:80px; height:80px; animation-delay:0.5s; }
.bor3 { width:100px;height:100px;animation-delay:1s; }
.bor-core { width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;font-size:1.6rem;z-index:1;animation:breathP 4s ease-in-out infinite; }
@keyframes breathP { 0%,100%{transform:scale(1);opacity:0.65} 50%{transform:scale(1.14);opacity:1} }

/* Button — NO hover effects */
.card-btn {
  width:100%; min-height:50px; border-radius:100px;
  border:none; cursor:pointer; margin-top:auto; flex-shrink:0;
  font-family:'DM Sans',sans-serif; font-weight:700;
  font-size:0.88rem; letter-spacing:0.06em; text-transform:uppercase;
  color:white; display:flex; align-items:center; justify-content:center; gap:7px;
  background:rgba(0,0,0,0.2);
  transition:opacity 0.15s;
}
.card-btn:hover { opacity:0.9; }
.card-btn:active { opacity:0.8; }

.swipe-hint { font-size:0.73rem; color:rgba(59,130,246,0.3); letter-spacing:0.04em; }

/* ── Finish ── */
#finishStage {
  display:none; position:fixed; inset:0; z-index:20;
  align-items:center; justify-content:center; padding:2rem;
}
#finishStage.show { display:flex; }
.finish-bg {
  position:absolute; inset:0;
  background:linear-gradient(135deg,#60a5fa,#34d399,#fbbf24,#f472b6,#a78bfa);
  background-size:400% 400%;
  animation:bgSh 7s ease infinite;
}
@keyframes bgSh { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
.finish-inner {
  position:relative; z-index:1;
  background:rgba(255,255,255,0.28);
  backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
  border:1.5px solid rgba(255,255,255,0.65);
  border-radius:32px; padding:2.4rem 2rem;
  max-width:400px; width:100%;
  display:flex; flex-direction:column; align-items:center; text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,0.1);
  animation:popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn { from{opacity:0;transform:scale(0.82)} to{opacity:1;transform:scale(1)} }
.finish-emoji { font-size:3.8rem; margin-bottom:0.9rem; }
.finish-flag { display:flex; gap:3px; height:5px; width:90px; border-radius:100px; overflow:hidden; margin:0 auto 1.2rem; }
.finish-flag span { flex:1; }
.finish-title { font-family:'Fraunces',serif; font-size:clamp(1.8rem,5vw,2.6rem); font-weight:900; color:#1a1a2e; line-height:1.18; margin-bottom:0.7rem; }
.finish-title em { font-style:italic; color:#2563eb; }
.finish-sub { font-size:0.92rem; font-weight:400; color:rgba(0,0,0,0.6); line-height:1.8; max-width:320px; margin-bottom:1.6rem; }
.finish-btn { background:rgba(0,0,0,0.18); border:2px solid rgba(255,255,255,0.7); border-radius:100px; padding:0.85rem 2.2rem; font-family:'DM Sans',sans-serif; font-weight:700; font-size:0.88rem; letter-spacing:0.06em; color:white; cursor:pointer; transition:opacity 0.15s; }
.finish-btn:hover { opacity:0.85; }

/* Confetti */
.conf-box { position:fixed;inset:0;z-index:99;pointer-events:none;overflow:hidden; }
.conf { position:absolute; animation:confFall linear forwards; }
@keyframes confFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(520deg);opacity:0} }
</style>

</head>

<body>

<div class="bg">
  <div class="bg-blob bb1"></div><div class="bg-blob bb2"></div>
  <div class="bg-blob bb3"></div><div class="bg-blob bb4"></div>
  <div class="bg-blob bb5"></div><div class="bg-blob bb6"></div>
</div>
<div class="conf-box" id="confBox"></div>

<div class="stage" id="mainStage">
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:10%"></div></div>
    <span class="prog-label" id="progLabel">1 / 10</span>
  </div>
  <div class="card-stack" id="cardStack"></div>
  <div class="swipe-hint">Swipe or tap to continue</div>
</div>

<div id="finishStage">
  <div class="finish-bg"></div>
  <div class="finish-inner">
    <div class="finish-emoji">&#9889;</div>
    <div class="finish-flag">
      <span style="background:#ef4444"></span><span style="background:#f97316"></span>
      <span style="background:#facc15"></span><span style="background:#22c55e"></span>
      <span style="background:#3b82f6"></span><span style="background:#a855f7"></span>
    </div>
    <h1 class="finish-title">Masculine on <em>your</em> terms.</h1>
    <p class="finish-sub">You do not owe anyone a performance. The truest version of masculinity is simply being fully, honestly yourself.</p>
    <button class="finish-btn" onclick="restart()">Start again &#8635;</button>
  </div>
</div>

<script>
const CARDS = [
  {
    theme:'t1', band:'linear-gradient(90deg,#60a5fa,#93c5fd,#38bdf8)',
    eye:'&#9889; Welcome',
    title:'Masculinity on Your Own Terms',
    btnLabel:'Begin &#10022;',
    content(){ return `
      <p class="card-text">Society has a very narrow idea of what it means to be a man. For gay men, that script rarely fits. This activity is about unpacking it, questioning it, and building something that actually belongs to you.</p>
      <div class="affirm-rows">
        <div class="affirm-row">You are not less of a man for being gay.</div>
        <div class="affirm-row">Masculinity belongs to you to define.</div>
      </div>
      <div class="notice">There is no correct way to be a man. There is only your way.</div>
    `}
  },
  {
    theme:'t2', band:'linear-gradient(90deg,#34d399,#6ee7b7,#2dd4bf)',
    eye:'&#128218; The Script',
    title:'What Society Told You to Be',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">From an early age, most men absorb a set of unspoken rules. Many gay men felt they could not meet these rules, or did not want to.</p>
      <div class="scenarios">
        <div class="scenario">
          <span class="sc-ic">&#128528;</span>
          <div><div class="sc-text">Do not show vulnerability</div><div class="sc-sub">Emotions were weakness. Strength meant silence.</div></div>
        </div>
        <div class="scenario">
          <span class="sc-ic">&#128170;</span>
          <div><div class="sc-text">Be dominant and competitive</div><div class="sc-sub">Win. Lead. Never ask for help.</div></div>
        </div>
        <div class="scenario">
          <span class="sc-ic">&#128148;</span>
          <div><div class="sc-text">Only be attracted to women</div><div class="sc-sub">Any other attraction was shameful or wrong.</div></div>
        </div>
      </div>
    `}
  },
  {
    theme:'t3', band:'linear-gradient(90deg,#fbbf24,#fde68a,#fb923c)',
    eye:'&#10060; Myth Busting',
    title:'These Myths Do Not Apply to You',
    btnLabel:'Next &#8594;',
    content(){ return `
      <div class="myth-grid">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px">
          <div class="myth-label m">Myth</div>
          <div class="myth-label t">Truth</div>
        </div>
        <div class="myth-row">
          <div class="myth-box myth">Gay men are not masculine</div>
          <div class="myth-box truth">Masculinity has no single form</div>
        </div>
        <div class="myth-row">
          <div class="myth-box myth">Sensitivity means weakness</div>
          <div class="myth-box truth">Sensitivity is emotional intelligence</div>
        </div>
        <div class="myth-row">
          <div class="myth-box myth">Real men do not need support</div>
          <div class="myth-box truth">Asking for help takes courage</div>
        </div>
      </div>
      <div class="notice">These myths were never yours. You do not have to carry them.</div>
    `}
  },
  {
    theme:'t4', band:'linear-gradient(90deg,#c084fc,#e879f9,#a78bfa)',
    eye:'&#128168; Breathe',
    title:'Let Go of What Was Never Yours',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">Take a moment to breathe and release the weight of expectations that were placed on you without your consent.</p>
      <div class="breath-center">
        <div class="breath-orb">
          <div class="bor bor3"></div>
          <div class="bor bor2"></div>
          <div class="bor bor1"></div>
          <div class="bor-core">&#129309;</div>
        </div>
      </div>
      <div class="steps">
        <div class="step"><span class="step-ic">&#128168;</span>Breathe in and think of one expectation you were given</div>
        <div class="step"><span class="step-ic">&#129308;</span>Breathe out and let it go</div>
        <div class="step"><span class="step-ic">&#10024;</span>That expectation was never yours to carry</div>
      </div>
    `}
  },
  {
    theme:'t5', band:'linear-gradient(90deg,#fb7185,#fda4af,#f43f5e)',
    eye:'&#128149; Tenderness',
    title:'Tenderness Is Not Weakness',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">Gay men have often modelled a masculinity that includes tenderness, care, and emotional depth. This is a strength, not a flaw.</p>
      <div class="scenarios">
        <div class="scenario">
          <span class="sc-ic">&#129309;</span>
          <div><div class="sc-text">Being emotionally available</div><div class="sc-sub">Showing up for people with honesty and care.</div></div>
        </div>
        <div class="scenario">
          <span class="sc-ic">&#128557;</span>
          <div><div class="sc-text">Allowing yourself to cry</div><div class="sc-sub">Grief and feeling are signs of being fully alive.</div></div>
        </div>
        <div class="scenario">
          <span class="sc-ic">&#127800;</span>
          <div><div class="sc-text">Expressing love openly</div><div class="sc-sub">Between men, love is powerful and real.</div></div>
        </div>
      </div>
    `}
  },
  {
    theme:'t6', band:'linear-gradient(90deg,#2dd4bf,#34d399,#06b6d4)',
    eye:'&#127919; Your Definition',
    title:'Build Your Own <em>Version</em>',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">You get to decide what masculinity means for you. Not inherited. Not performed. Genuinely yours.</p>
      <div class="steps">
        <div class="step"><span class="step-ic">&#128170;</span>Strength can mean protecting your peace</div>
        <div class="step"><span class="step-ic">&#127775;</span>Confidence can mean knowing your worth quietly</div>
        <div class="step"><span class="step-ic">&#128149;</span>Courage can mean loving openly and honestly</div>
        <div class="step"><span class="step-ic">&#9889;</span>Power can mean lifting others up</div>
      </div>
    `}
  },
  {
    theme:'t7', band:'linear-gradient(90deg,#a78bfa,#8b5cf6,#c4b5fd)',
    eye:'&#127917; Other Gay Men',
    title:'You Are Not the Only One Who Felt This',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">Millions of gay men have wrestled with these same questions. Many found, on the other side, a freedom that straight men rarely experience.</p>
      <div class="quote-strip">
        <span class="qs-mark">&#8220;</span>
        <p class="qs-text">Being gay forced me to throw out the script entirely. What I built instead felt like the first honest thing about me.</p>
        <p class="qs-attr">Shared by a community member</p>
      </div>
      <p class="card-text" style="margin-bottom:0">Rejecting the old script is not a loss. It is an opening.</p>
    `}
  },
  {
    theme:'t8', band:'linear-gradient(90deg,#fbbf24,#fb923c,#fde68a)',
    eye:'&#128101; Gay Masculinity',
    title:'Gay Men Redefined <em>Masculinity</em>',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">For decades, gay men have created their own codes of masculinity, community, and strength. These are worth celebrating.</p>
      <div class="scenarios">
        <div class="scenario">
          <span class="sc-ic">&#129309;</span>
          <div><div class="sc-text">Friendship as brotherhood</div><div class="sc-sub">Deep male friendships that are honest and emotionally rich.</div></div>
        </div>
        <div class="scenario">
          <span class="sc-ic">&#128296;</span>
          <div><div class="sc-text">Resilience under pressure</div><div class="sc-sub">Surviving discrimination and building community anyway.</div></div>
        </div>
        <div class="scenario">
          <span class="sc-ic">&#127912;</span>
          <div><div class="sc-text">Creativity and expression</div><div class="sc-sub">Art, fashion, music — gay men shaped culture boldly.</div></div>

    `}
  },
  {
    theme:'t9', band:'linear-gradient(90deg,#38bdf8,#0ea5e9,#7dd3fc)',
    eye:'&#127358; No Template',
    title:'No Two Gay Men Are the Same',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">Gay masculinity is not a single thing. It is as wide and varied as the men who live it.</p>
      <div class="scenarios">
        <div class="scenario">
          <span class="sc-ic">&#127936;</span>

  {
    theme:'t10', band:'linear-gradient(90deg,#f472b6,#c084fc,#60a5fa)',

    content(){ return `
      <p class="card-text">You do not need to prove anything to anyone. You are a man by simply being yourself.</p>
      <div class="affirm-rows">

        <div class="affirm-row">My softness and my strength are both mine.</div>

let current = 0, isDragging=false, startX=0, dragX=0;
const CONF = ['#93c5fd','#86efac','#fde68a','#c4b5fd','#fda4af','#6ee7b7','#fbbf24','#a5b4fc'];

function buildCards() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';
  CARDS.forEach((d,i) => {
    const card = document.createElement('div');
    card.className = 'card ' + d.theme;
    card.id = 'card'+i;
    card.innerHTML = `
      <div class="cdeco cd1"></div>
      <div class="cdeco cd2"></div>
      <div class="card-band" style="background:${d.band}"></div>
      <div class="card-body-wrap">
        <div class="card-eye">${d.eye}</div>
        <div class="card-title">${d.title}</div>
        ${d.content()}
        <button class="card-btn" onclick="advance()">${d.btnLabel}</button>
      </div>
    `;
    card.addEventListener('mousedown',  e => startDrag(e.clientX));
    card.addEventListener('touchstart', e => startDrag(e.touches[0].clientX), {passive:true});
    stack.appendChild(card);
  });
  updatePos();
}

function updatePos() {
  CARDS.forEach((_,i) => {
    const el = document.getElementById('card'+i);
    el.className = 'card ' + CARDS[i].theme;
    if      (i < current)     el.classList.add('prev');
    else if (i === current)   el.classList.add('active');
    else if (i === current+1) el.classList.add('behind1');
    else if (i === current+2) el.classList.add('behind2');
    else                      el.classList.add('hidden');
  });
  const pct = ((current+1)/CARDS.length)*100;
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progLabel').textContent = (current+1)+' / '+CARDS.length;
}

function advance() {
  current++;
  if (current >= CARDS.length) { showFinish(); return; }
  updatePos();
}

function showFinish() {
  document.getElementById('mainStage').style.display = 'none';
  document.getElementById('finishStage').classList.add('show');
  burst(90); setTimeout(() => burst(60), 800);
}

function restart() {
  current = 0;
  document.getElementById('finishStage').classList.remove('show');
  document.getElementById('mainStage').style.display = 'flex';
  buildCards();
}

function startDrag(x) {
  isDragging=true; startX=x; dragX=0;
  const el = document.getElementById('card'+current);
  if (el) el.classList.add('swiping');
  const onMove = cx => { if(!isDragging)return; dragX=cx-startX; const e=document.getElementById('card'+current); if(e) e.style.transform=`translateX(${dragX}px) rotate(${dragX*0.04}deg)`; };
  const onUp = () => { isDragging=false; const e=document.getElementById('card'+current); if(e){e.classList.remove('swiping');e.style.transform='';} if(Math.abs(dragX)>85)advance(); window.removeEventListener('mousemove',mm); window.removeEventListener('touchmove',tm); window.removeEventListener('mouseup',onUp); window.removeEventListener('touchend',onUp); };
  const mm=e=>onMove(e.clientX), tm=e=>onMove(e.touches[0].clientX);
  window.addEventListener('mousemove',mm); window.addEventListener('touchmove',tm,{passive:true});
  window.addEventListener('mouseup',onUp); window.addEventListener('touchend',onUp);
}

function burst(count) {
  const box = document.getElementById('confBox');
  for (let i=0;i<count;i++) {
    const c=document.createElement('div'); c.className='conf';
    const size=Math.random()*10+5;
    c.style.cssText=`left:${Math.random()*100}%;top:-20px;width:${size}px;height:${size}px;background:${CONF[Math.floor(Math.random()*CONF.length)]};border-radius:${Math.random()>0.45?'50%':'3px'};animation-duration:${Math.random()*1.6+1}s;animation-delay:${Math.random()*0.5}s;`;
    box.appendChild(c);
    c.addEventListener('animationend',()=>c.remove());
  }
}

buildCards();
</script>
