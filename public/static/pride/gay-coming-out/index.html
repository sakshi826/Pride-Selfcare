<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Out to Yourself</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;0,900;1,300;1,500;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; }

body { background:#fff8f0; }

/* ── Deep night sky background ── */
.bg {
  position:fixed; inset:0; z-index:0;
  background:linear-gradient(160deg,#fff8f0 0%,#fef3f8 50%,#f0f4ff 100%);
}
.bg-blob { position:absolute; border-radius:50%; filter:blur(90px); will-change:transform; }
.bb1 { width:500px;height:500px;background:#f87171;opacity:0.35;top:-150px;left:-130px; animation:bv1 20s ease-in-out infinite alternate; }
.bb2 { width:420px;height:420px;background:#818cf8;opacity:0.4;bottom:-100px;right:-100px; animation:bv2 24s ease-in-out infinite alternate; }
.bb3 { width:340px;height:340px;background:#34d399;opacity:0.38;top:30%;right:-60px; animation:bv1 17s ease-in-out infinite alternate-reverse; }
.bb4 { width:260px;height:260px;background:#fbbf24;opacity:0.45;bottom:15%;left:-50px; animation:bv2 19s ease-in-out infinite alternate; }
.bb5 { width:300px;height:300px;background:#f472b6;opacity:0.35;top:50%;left:30%; animation:bv1 16s ease-in-out infinite alternate; }
.bb6 { width:240px;height:240px;background:#4ade80;opacity:0.3;top:10%;right:20%; animation:bv2 21s ease-in-out infinite alternate-reverse; }
@keyframes bv1 { from{transform:translate(0,0)} to{transform:translate(28px,20px)} }
@keyframes bv2 { from{transform:translate(0,0)} to{transform:translate(-22px,-16px)} }



/* ── Stage ── */
.stage {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:1rem 1.2rem; gap:0.8rem;
}

/* ── Progress ── */
.prog-wrap { width:100%; max-width:440px; display:flex; align-items:center; gap:10px; }
.prog-track { flex:1; height:4px; background:rgba(255,255,255,0.08); border-radius:100px; overflow:hidden; }
.prog-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,#4f46e5,#0ea5e9,#7c3aed); transition:width 0.6s cubic-bezier(0.22,1,0.36,1); }
.prog-label { font-size:0.74rem; font-weight:600; color:rgba(79,70,229,0.55); min-width:36px; text-align:right; letter-spacing:0.04em; }

/* ── Card stack ── */
.card-stack {
  width:100%; max-width:440px;
  position:relative;
  height:clamp(500px, 72vh, 600px);
}

.card {
  position:absolute; inset:0;
  border-radius:28px;
  display:flex; flex-direction:column;
  box-shadow:0 16px 40px rgba(0,0,0,0.15), 0 4px 14px rgba(0,0,0,0.08);
  transition:transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
  will-change:transform; overflow:hidden; user-select:none; cursor:grab;
}
.card.hidden  { opacity:0; transform:translateX(115%) rotate(8deg); pointer-events:none; }
.card.active  { opacity:1; transform:translateX(0) rotate(0); z-index:5; }
.card.prev    { opacity:0; transform:translateX(-115%) rotate(-8deg); pointer-events:none; }
.card.behind1 { opacity:0.55; transform:scale(0.93) translateY(14px); z-index:4; pointer-events:none; }
.card.behind2 { opacity:0.3;  transform:scale(0.87) translateY(26px); z-index:3; pointer-events:none; }
.card.swiping { transition:none; }

/* Card themes — rich dark gradients */
.t1 { background:linear-gradient(145deg,#c7d2fe,#a5b4fc,#93c5fd); }
.t2 { background:linear-gradient(145deg,#7dd3fc,#38bdf8,#a5f3fc); }
.t3 { background:linear-gradient(145deg,#e879f9,#c084fc,#a78bfa); }
.t4 { background:linear-gradient(145deg,#67e8f9,#22d3ee,#60a5fa); }
.t5 { background:linear-gradient(145deg,#6ee7b7,#34d399,#2dd4bf); }
.t6 { background:linear-gradient(145deg,#a5b4fc,#818cf8,#c4b5fd); }
.t7 { background:linear-gradient(145deg,#fda4af,#fb7185,#f9a8d4); }
.t8 { background:linear-gradient(145deg,#7dd3fc,#67e8f9,#a5f3fc); }
.t9 { background:linear-gradient(145deg,#f0abfc,#e879f9,#fda4af); }
.t10{ background:linear-gradient(145deg,#fde68a,#fbbf24,#fb923c); }

/* Card deco */
.cdeco { position:absolute; border-radius:50%; pointer-events:none; }
.cd1 { width:260px;height:260px;top:-90px;right:-90px;background:rgba(255,255,255,0.5); }
.cd2 { width:180px;height:180px;bottom:-60px;left:-60px;background:rgba(255,255,255,0.4); }

/* Card top band */
.card-band { height:4px; width:100%; flex-shrink:0; }

/* Card body */
.card-body-wrap {
  padding:1.5rem 1.8rem 1.5rem;
  display:flex; flex-direction:column; flex:1; overflow:hidden;
}

.card-eye {
  font-size:0.67rem; font-weight:700; letter-spacing:0.14em;
  text-transform:uppercase; margin-bottom:0.3rem;
  opacity:0.75; display:flex; align-items:center; gap:6px; color:#4f46e5;
}

.card-title {
  font-family:'Fraunces',serif; font-weight:700;
  font-size:clamp(1.3rem,3.8vw,1.65rem); line-height:1.22;
  margin-bottom:0.75rem; color:#1e1b4b;
}
.card-title em { font-style:italic; font-weight:500; opacity:0.85; }

.card-text {
  font-size:0.9rem; font-weight:300; line-height:1.78;
  color:#1e1b4b; margin-bottom:0.75rem; flex:1;
}

/* Scenario blocks */
.scenarios { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:0.75rem; }
.scenario {
  border-radius:14px; padding:0.75rem 1rem;
  display:flex; align-items:flex-start; gap:10px;
  border-left:3px solid; background:rgba(255,255,255,0.07);
  animation:scIn 0.45s ease both;
  border:1px solid rgba(255,255,255,0.1);
  border-left-width:3px;
}
.scenario:nth-child(1){ animation-delay:0.08s; }
.scenario:nth-child(2){ animation-delay:0.2s; }
.scenario:nth-child(3){ animation-delay:0.32s; }
@keyframes scIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
.sc-ic { font-size:1.1rem; flex-shrink:0; margin-top:1px; }
.sc-text { font-size:0.87rem; font-weight:600; line-height:1.5; color:#1e1b4b; }
.sc-sub  { font-size:0.78rem; font-weight:300; color:#6b7280; margin-top:2px; line-height:1.45; }

/* Steps */
.steps { display:flex; flex-direction:column; gap:0.45rem; margin-bottom:0.75rem; }
.step {
  display:flex; align-items:center; gap:9px;
  border-radius:12px; padding:0.6rem 0.9rem;
  background:rgba(255,255,255,0.65); border:1px solid rgba(0,0,0,0.07);
  font-size:0.87rem; font-weight:500; line-height:1.5; color:#1e1b4b;
  animation:scIn 0.4s ease both;
}
.step:nth-child(1){ animation-delay:0.05s; }
.step:nth-child(2){ animation-delay:0.15s; }
.step:nth-child(3){ animation-delay:0.25s; }
.step:nth-child(4){ animation-delay:0.35s; }
.step-ic { font-size:1rem; flex-shrink:0; }

/* Affirmation rows */
.affirm-rows { display:flex; flex-direction:column; gap:0.55rem; margin-bottom:0.75rem; }
.affirm-row {
  border-left:4px solid; border-radius:0 16px 16px 0;
  padding:0.9rem 1.2rem;
  font-family:'Fraunces',serif; font-style:italic; font-weight:700;
  font-size:1.06rem; line-height:1.45;
  background:rgba(255,255,255,0.3); color:#1e1b4b;
  opacity:0; animation:scIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
}
.affirm-row:nth-child(1){ animation-delay:0.1s; }
.affirm-row:nth-child(2){ animation-delay:0.26s; }
.affirm-row:nth-child(3){ animation-delay:0.42s; }

/* Quote strip */
.quote-strip {
  border-radius:16px; padding:1rem 1.2rem;
  background:rgba(255,255,255,0.3); border:1px solid rgba(255,255,255,0.5);
  border-left:4px solid; margin-bottom:0.75rem;
  animation:fadeSlide 0.5s ease both 0.15s;
}
@keyframes fadeSlide { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.qs-mark { font-family:'Fraunces',serif; font-size:2.5rem; line-height:0.4; opacity:0.25; color:#4f46e5; display:block; margin-bottom:0.35rem; }
.qs-text { font-family:'Fraunces',serif; font-style:italic; font-size:1.05rem; font-weight:500; line-height:1.55; color:#1e1b4b; }
.qs-attr { font-size:0.72rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; margin-top:0.4rem; color:#6b7280; }

/* Breath orb */
.breath-center { display:flex; align-items:center; justify-content:center; margin-bottom:1.2rem; }
.breath-orb {
  position:relative; width:100px; height:100px;
  display:flex; align-items:center; justify-content:center;
}
.bor { position:absolute; border-radius:50%; border:1px solid rgba(99,102,241,0.3); animation:breathP 4s ease-in-out infinite; }
.bor1 { width:60px; height:60px; }
.bor2 { width:80px; height:80px; animation-delay:0.5s; }
.bor3 { width:100px;height:100px;animation-delay:1s; }
.bor-core { width:50px;height:50px;border-radius:50%;background:rgba(99,102,241,0.12);display:flex;align-items:center;justify-content:center;font-size:1.6rem;z-index:1;animation:breathP 4s ease-in-out infinite; }
@keyframes breathP { 0%,100%{transform:scale(1);opacity:0.6} 50%{transform:scale(1.14);opacity:1} }

/* Notice box */
.notice {
  border-radius:14px; padding:0.85rem 1rem;
  background:rgba(255,255,255,0.35); border:1px solid rgba(255,255,255,0.5);
  font-size:0.86rem; font-style:italic; font-weight:300;
  color:#1e1b4b; line-height:1.6; margin-bottom:0.75rem;
  animation:fadeSlide 0.5s ease both 0.2s;
}

/* Card button */
.card-btn {
  width:100%; min-height:50px; border-radius:100px;
  border:none; cursor:pointer; margin-top:auto; flex-shrink:0;
  font-family:'DM Sans',sans-serif; font-weight:600;
  font-size:0.88rem; letter-spacing:0.06em; text-transform:uppercase;
  color:white; display:flex; align-items:center; justify-content:center; gap:7px;
  transition:opacity 0.15s;
}
.card-btn:hover { opacity:0.95; }
.card-btn:active { opacity:0.9; }

.swipe-hint { font-size:0.73rem; color:rgba(79,70,229,0.3); letter-spacing:0.04em; }

/* ── Finish ── */
#finishStage {
  display:none; position:fixed; inset:0; z-index:20;
  align-items:center; justify-content:center; padding:2rem;
}
#finishStage.show { display:flex; }
.finish-bg {
  position:absolute; inset:0;
  background:linear-gradient(135deg,#4f46e5,#0ea5e9,#7c3aed,#06b6d4);
  background-size:300% 300%;
  animation:bgSh 8s ease infinite;
}
@keyframes bgSh { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
.finish-inner {
  position:relative; z-index:1;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:32px; padding:2.4rem 2rem;
  max-width:400px; width:100%;
  display:flex; flex-direction:column; align-items:center; text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,0.4);
  animation:popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn { from{opacity:0;transform:scale(0.82)} to{opacity:1;transform:scale(1)} }
.finish-emoji { font-size:3.8rem; margin-bottom:0.9rem; }
.finish-flag { display:flex; gap:3px; height:4px; width:80px; border-radius:100px; overflow:hidden; margin:0 auto 1.2rem; }
.finish-flag span { flex:1; }
.finish-title { font-family:'Fraunces',serif; font-size:clamp(1.8rem,5vw,2.6rem); font-weight:900; color:white; line-height:1.18; margin-bottom:0.7rem; }
.finish-title em { font-style:italic; color:#bfdbfe; }
.finish-sub { font-size:0.92rem; font-weight:300; color:rgba(255,255,255,0.8); line-height:1.8; max-width:320px; margin-bottom:1.6rem; }
.finish-btn { background:rgba(255,255,255,0.15); border:1.5px solid rgba(255,255,255,0.4); border-radius:100px; padding:0.85rem 2.2rem; font-family:'DM Sans',sans-serif; font-weight:600; font-size:0.88rem; letter-spacing:0.06em; color:white; cursor:pointer; transition:background 0.15s, transform 0.12s; }
.finish-btn:hover { background:rgba(255,255,255,0.25); transform:translateY(-1px); }

/* Confetti */
.conf-box { position:fixed;inset:0;z-index:99;pointer-events:none;overflow:hidden; }
.conf { position:absolute; animation:confFall linear forwards; }
@keyframes confFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(520deg);opacity:0} }
</style>

</head>

<body>

<div class="bg">
  <div class="bg-blob bb1"></div><div class="bg-blob bb2"></div>
  <div class="bg-blob bb3"></div><div class="bg-blob bb4"></div>
  <div class="bg-blob bb5"></div>
  <div class="bg-blob bb6"></div>
</div>

<div class="conf-box" id="confBox"></div>

<div class="stage" id="mainStage">
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:10%"></div></div>
    <span class="prog-label" id="progLabel">1 / 10</span>
  </div>
  <div class="card-stack" id="cardStack"></div>
  <div class="swipe-hint">Swipe or tap to continue</div>
</div>

<div id="finishStage">
  <div class="finish-bg"></div>
  <div class="finish-inner">
    <div class="finish-emoji">&#10024;</div>
    <div class="finish-flag">
      <span style="background:#ef4444"></span><span style="background:#f97316"></span>
      <span style="background:#facc15"></span><span style="background:#22c55e"></span>
      <span style="background:#3b82f6"></span><span style="background:#a855f7"></span>
    </div>
    <h1 class="finish-title">You already <em>know</em><br>who you are.</h1>
    <p class="finish-sub">Coming out to yourself is the most important moment. Everything else follows from this truth. You are valid, real, and worthy of a life lived fully as yourself.</p>
    <button class="finish-btn" onclick="restart()">Start again &#8635;</button>
  </div>
</div>

<script>


const CARDS = [
  {
    theme:'t1', band:'linear-gradient(90deg,#4f46e5,#818cf8)',
    btn:'rgba(99,102,241,0.9)', btnSh:'rgba(99,102,241,0.4)',
    eye:'&#10024; The Beginning',
    title:'Coming Out to Yourself',
    btnLabel:'Begin &#10022;',
    content(){ return `
      <p class="card-text">Before you tell anyone else, there is a quieter, more important coming out. The one that happens inside. The moment you stop pretending, even just to yourself, and let the truth finally breathe.</p>
      <div class="notice">This is a space without judgment. Whatever you are feeling right now is welcome here.</div>
      <div class="affirm-rows">
        <div class="affirm-row" style="border-left-color:#818cf8">You do not have to have all the answers yet.</div>
        <div class="affirm-row" style="border-left-color:#6366f1">This is yours to discover at your own pace.</div>
      </div>
    `}
  },
  {
    theme:'t2', band:'linear-gradient(90deg,#1d4ed8,#0ea5e9)',
    btn:'rgba(14,165,233,0.9)', btnSh:'rgba(14,165,233,0.4)',
    eye:'&#129300; The Feeling',
    title:'When You First <em>Knew</em>',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">For many gay men, there is a memory. A moment, maybe small, maybe overwhelming, when something clicked. It may have felt exciting. Or terrifying. Or both.</p>
      <div class="scenarios">
        <div class="scenario" style="border-left-color:#0ea5e9">
          <span class="sc-ic">&#128064;</span>
          <div><div class="sc-text">A feeling you could not explain</div><div class="sc-sub">Something about a friend, a stranger, a scene in a film.</div></div>
        </div>
        <div class="scenario" style="border-left-color:#38bdf8">
          <span class="sc-ic">&#128148;</span>
          <div><div class="sc-text">A crush you tried to ignore</div><div class="sc-sub">You told yourself it was admiration. But you knew.</div></div>
        </div>
        <div class="scenario" style="border-left-color:#7dd3fc">
          <span class="sc-ic">&#128161;</span>
          <div><div class="sc-text">The word that finally fit</div><div class="sc-sub">Reading it, hearing it, and feeling something settle.</div></div>
        </div>
      </div>
    `}
  },
  {
    theme:'t3', band:'linear-gradient(90deg,#7c3aed,#c026d3)',
    btn:'rgba(124,58,237,0.9)', btnSh:'rgba(124,58,237,0.4)',
    eye:'&#128172; The Inner Voice',
    title:'The Voice That Said <em>Not That</em>',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">Many of us spent years arguing with ourselves. Rationalising, suppressing, reframing. That voice was not protecting you. It was just afraid.</p>
      <div class="scenarios">
        <div class="scenario" style="border-left-color:#a855f7">
          <span class="sc-ic">&#128543;</span>
          <div><div class="sc-text">I am just going through a phase</div><div class="sc-sub">Phases do not last years and return every time.</div></div>
        </div>
        <div class="scenario" style="border-left-color:#c026d3">
          <span class="sc-ic">&#128528;</span>
          <div><div class="sc-text">I just have not met the right woman</div><div class="sc-sub">Familiar. And never quite convincing.</div></div>
        </div>
        <div class="scenario" style="border-left-color:#9333ea">
          <span class="sc-ic">&#128558;</span>
          <div><div class="sc-text">What if I am wrong about myself</div><div class="sc-sub">You were not wrong. You were scared.</div></div>
        </div>
      </div>
    `}
  },
  {
    theme:'t4', band:'linear-gradient(90deg,#0891b2,#0ea5e9)',
    btn:'rgba(8,145,178,0.9)', btnSh:'rgba(8,145,178,0.4)',
    eye:'&#128168; Breathe',
    title:'Sit With It for a Moment',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">You do not have to do anything with this truth right now. You just have to let yourself hold it.</p>
      <div class="breath-center">
        <div class="breath-orb">
          <div class="bor bor3"></div>
          <div class="bor bor2"></div>
          <div class="bor bor1"></div>
          <div class="bor-core">&#128149;</div>
        </div>
      </div>
      <div class="steps">
        <div class="step"><span class="step-ic">&#128168;</span>Take a slow breath in</div>
        <div class="step"><span class="step-ic">&#127775;</span>Say in your mind: I am allowed to be this</div>
        <div class="step"><span class="step-ic">&#128149;</span>Let that land. Notice how it feels.</div>
      </div>
    `}
  },
  {
    theme:'t5', band:'linear-gradient(90deg,#059669,#0d9488)',
    btn:'rgba(5,150,105,0.9)', btnSh:'rgba(5,150,105,0.4)',
    eye:'&#127757; You Are Not Alone',
    title:'Millions of Men Have Stood Here',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">Every gay man who has ever lived has had this moment. The private reckoning. And most of them found, eventually, that the truth was not a disaster. It was a door.</p>
      <div class="quote-strip" style="border-left-color:#34d399">
        <span class="qs-mark">&#8220;</span>
        <p class="qs-text">Coming out to myself was the bravest and loneliest thing I ever did. And also the thing that gave me my whole life back.</p>
        <p class="qs-attr">Shared by a community member</p>
      </div>
      <p class="card-text" style="margin-bottom:0">What felt like an ending was the start of something real.</p>
    `}
  },
  {
    theme:'t6', band:'linear-gradient(90deg,#4f46e5,#7c3aed)',
    btn:'rgba(79,70,229,0.9)', btnSh:'rgba(79,70,229,0.4)',
    eye:'&#127358; No Rush',
    title:'You Are Not Behind',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">Some men know at 13. Some at 30. Some at 55. There is no correct age to arrive at yourself. The only timeline that matters is yours.</p>
      <div class="steps">
        <div class="step"><span class="step-ic">&#10003;</span>Coming out later does not mean you were lying before</div>
        <div class="step"><span class="step-ic">&#10003;</span>You were surviving the tools you had at the time</div>
        <div class="step"><span class="step-ic">&#10003;</span>Wherever you are is the right place to start</div>
        <div class="step"><span class="step-ic">&#10003;</span>There is a whole community waiting for you</div>
      </div>

let current = 0, isDragging=false, startX=0, dragX=0;
const CONF = ['#818cf8','#38bdf8','#a855f7','#06b6d4','#f472b6','#4f46e5','#7c3aed'];

function buildCards() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';
  CARDS.forEach((d,i) => {
    const card = document.createElement('div');
    card.className = 'card ' + d.theme;
    card.id = 'card'+i;
    card.innerHTML = `
      <div class="cdeco cd1"></div>
      <div class="cdeco cd2"></div>
      <div class="card-band" style="background:${d.band}"></div>
      <div class="card-body-wrap">
        <div class="card-eye">${d.eye}</div>
        <div class="card-title">${d.title}</div>
        ${d.content()}
        <button class="card-btn" style="background:${d.btn};box-shadow:0 5px 22px ${d.btnSh}" onclick="advance()">${d.btnLabel}</button>
      </div>
    `;
    card.addEventListener('mousedown',  e => startDrag(e.clientX));
    card.addEventListener('touchstart', e => startDrag(e.touches[0].clientX), {passive:true});
    stack.appendChild(card);
  });
  updatePos();
}

function updatePos() {
  CARDS.forEach((_,i) => {
    const el = document.getElementById('card'+i);
    el.className = 'card ' + CARDS[i].theme;
    if      (i < current)     el.classList.add('prev');
    else if (i === current)   el.classList.add('active');
    else if (i === current+1) el.classList.add('behind1');
    else if (i === current+2) el.classList.add('behind2');
    else                      el.classList.add('hidden');
  });
  const pct = ((current+1)/CARDS.length)*100;
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progLabel').textContent = (current+1)+' / '+CARDS.length;
}

function advance() {
  current++;
  if (current >= CARDS.length) { showFinish(); return; }
  updatePos();
}

function showFinish() {
  document.getElementById('mainStage').style.display = 'none';
  document.getElementById('finishStage').classList.add('show');
  burst(90); setTimeout(() => burst(60), 800);
}

function restart() {
  current = 0;
  document.getElementById('finishStage').classList.remove('show');
  document.getElementById('mainStage').style.display = 'flex';
  buildCards();
}

function startDrag(x) {
  isDragging=true; startX=x; dragX=0;
  const el = document.getElementById('card'+current);
  if (el) el.classList.add('swiping');
  const onMove = cx => { if(!isDragging)return; dragX=cx-startX; const e=document.getElementById('card'+current); if(e) e.style.transform=`translateX(${dragX}px) rotate(${dragX*0.04}deg)`; };
  const onUp = () => { isDragging=false; const e=document.getElementById('card'+current); if(e){e.classList.remove('swiping');e.style.transform='';} if(Math.abs(dragX)>85)advance(); window.removeEventListener('mousemove',mm); window.removeEventListener('touchmove',tm); window.removeEventListener('mouseup',onUp); window.removeEventListener('touchend',onUp); };
  const mm=e=>onMove(e.clientX), tm=e=>onMove(e.touches[0].clientX);
  window.addEventListener('mousemove',mm); window.addEventListener('touchmove',tm,{passive:true});
  window.addEventListener('mouseup',onUp); window.addEventListener('touchend',onUp);
}

function burst(count) {
  const box = document.getElementById('confBox');
  for (let i=0;i<count;i++) {
    const c=document.createElement('div'); c.className='conf';
    const size=Math.random()*10+5;
    c.style.cssText=`left:${Math.random()*100}%;top:-20px;width:${size}px;height:${size}px;background:${CONF[Math.floor(Math.random()*CONF.length)]};border-radius:${Math.random()>0.45?'50%':'3px'};animation-duration:${Math.random()*1.6+1}s;animation-delay:${Math.random()*0.5}s;`;
    box.appendChild(c);
    c.addEventListener('animationend',()=>c.remove());
  }
}

buildCards();
</script>

        const urlParams = new URLSearchParams(window.location.search);

        // Force cookie for Google Translate
        const domain = window.location.hostname;
        document.cookie = "googtrans=/en/" + lang + "; path=/; domain=" + domain;
        document.cookie = "googtrans=/en/" + lang + "; path=/";
        
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: true
        }, 'google_translate_element');
        
        // Periodically check and force the dropdown
        let attempts = 0;
        const interval = setInterval(() => {
            const select = document.querySelector('select.goog-te-combo');
            if (select) {
                if (select.value !== lang) {
                    select.value = lang;
                    select.dispatchEvent(new Event('change'));
                }
                attempts++;
                if (attempts > 10) clearInterval(interval);
            }
        }, 1000);
    }
