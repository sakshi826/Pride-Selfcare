<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Stories of Lesbian Women</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fff8f8;
    --ink: #1a1a2e;
    --rose: #e8445a;
    --pink: #f472b6;
    --purple: #9b5de5;
    --coral: #f4824a;
    --teal: #2dd4bf;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; overflow-x:hidden; }

  /* ===== HERO ===== */
  #hero {
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding:2rem; position:relative; overflow:hidden;
  }

  .pride-bar {
    position:absolute; top:0; left:0; right:0; height:6px;
    background:linear-gradient(90deg,#b55690,#d262a6,#e0a0c0,#e5638b,#a50062);
  }

  .hero-orbs { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .orb { position:absolute; border-radius:50%; filter:blur(70px); opacity:0.14; animation:drift 9s ease-in-out infinite alternate; }
  .orb1 { width:520px;height:520px;background:#f472b6;top:-15%;left:-18%;animation-delay:0s; }
  .orb2 { width:420px;height:420px;background:#9b5de5;top:25%;right:-12%;animation-delay:-2.5s; }
  .orb3 { width:380px;height:380px;background:#e8445a;bottom:-8%;left:18%;animation-delay:-5s; }
  .orb4 { width:320px;height:320px;background:#fda4af;top:8%;right:28%;animation-delay:-1.5s; }
  @keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(35px,22px) scale(1.06)} }

  .hero-badge {
    display:inline-flex; align-items:center; gap:10px;
    background:white; border:2px solid var(--ink); border-radius:100px;
    padding:8px 20px; font-size:0.75rem; font-weight:600;
    letter-spacing:0.1em; text-transform:uppercase; margin-bottom:2.2rem;
    box-shadow:3px 3px 0 var(--ink); animation:fadeUp 0.8s ease both;
  }

  .flag-dots { display:flex; gap:5px; }
  .flag-dots span { width:9px;height:9px;border-radius:50%;display:inline-block; }

  h1.hero-title {
    font-family:'DM Serif Display',serif; font-weight:400;
    font-size:clamp(2.6rem,5.5vw,4.8rem); line-height:1.1;
    max-width:700px; margin-bottom:1.3rem;
    animation:fadeUp 0.8s 0.1s ease both;
  }
  h1.hero-title em { font-style:italic; color:var(--rose); }

  .hero-sub {
    font-size:1.1rem; color:#555; max-width:480px;
    line-height:1.75; margin-bottom:0.9rem;
    animation:fadeUp 0.8s 0.2s ease both;
  }
  .hero-quote { font-style:italic; font-size:0.9rem; color:#999; margin-bottom:2.6rem; animation:fadeUp 0.8s 0.3s ease both; }

  .cta-btn {
    display:inline-block; background:var(--ink); color:white;
    font-family:'DM Sans',sans-serif; font-weight:600; font-size:1rem;
    padding:1rem 2.6rem; border-radius:100px; border:none; cursor:pointer;
    box-shadow:4px 4px 0 var(--rose);
    transition:transform 0.15s, box-shadow 0.15s;
    animation:fadeUp 0.8s 0.4s ease both;
  }
  .cta-btn:hover { transform:translate(-2px,-2px); box-shadow:6px 6px 0 var(--rose); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

  /* ===== STORIES LIST ===== */
  #stories-list { display:none; padding:5rem 2rem 4rem; max-width:680px; margin:0 auto; }

  .section-header { margin-bottom:2.6rem; }
  .section-header h2 { font-family:'DM Serif Display',serif; font-size:2.4rem; margin-bottom:0.4rem; }
  .section-header p { color:#777; font-size:0.95rem; }

  .story-cards { display:flex; flex-direction:column; gap:1.1rem; }

  .story-card {
    background:white; border-radius:20px; padding:0;
    cursor:pointer; border:2px solid transparent;
    transition:all 0.22s ease; overflow:hidden;
    display:flex; align-items:stretch;
  }
  .card-stripe { width:6px; flex-shrink:0; }
  .card-body-s { padding:1.4rem 1.6rem; flex:1; }
  .story-card:hover { transform:translateX(6px); box-shadow:-5px 5px 0 var(--ink); border-color:var(--ink); }

  .card-top { display:flex; align-items:center; gap:10px; margin-bottom:0.4rem; }
  .card-avatar { width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid; }
  .card-avatar img { width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:50%; }
  .card-avatar svg { width:100%;height:100%; }
  .card-name { font-weight:600;font-size:1rem;display:flex;align-items:center;gap:8px; }
  .card-tag { font-size:0.65rem;font-weight:700;padding:2px 10px;border-radius:100px;letter-spacing:0.06em;text-transform:uppercase; }
  .card-quote { font-style:italic;color:#666;font-size:0.9rem;line-height:1.55; }

  /* ===== STORY DETAIL ===== */
  #story-detail { display:none; max-width:640px; margin:0 auto; padding:5rem 2rem 6rem; }

  .back-btn {
    display:inline-flex;align-items:center;gap:6px;font-size:0.85rem;font-weight:600;
    color:#666;cursor:pointer;margin-bottom:2.2rem;transition:color 0.15s;
    background:none;border:none;
  }
  .back-btn:hover { color:var(--ink); }

  .story-hero-band {
    height:7px;border-radius:100px;margin-bottom:2rem;
    background:linear-gradient(90deg,#b55690,#d262a6,#e0a0c0,#e5638b,#a50062);
  }
  .portrait-wrap { width:100%;border-radius:20px;margin-bottom:1.8rem;position:relative; }
  .portrait-wrap img { width:100%;height:auto;display:block;border-radius:20px; }
  .portrait-wrap svg { width:100%;height:100%; }

  .story-name-large { font-family:'DM Serif Display',serif;font-size:2.5rem;margin-bottom:0.4rem; }
  .story-identity-badge {
    display:inline-block;font-size:0.78rem;font-weight:700;padding:5px 16px;
    border-radius:100px;letter-spacing:0.06em;text-transform:uppercase;
    margin-bottom:2rem;border:2px solid;
  }
  .story-body { font-size:0.97rem;line-height:1.9;color:#333; }
  .story-body p { margin-bottom:1.15rem; }

  .story-highlight {
    border-left:5px solid;padding:1.1rem 1.5rem;border-radius:0 14px 14px 0;
    margin:2rem 0;font-style:italic;font-size:1.08rem;line-height:1.65;
    font-family:'DM Serif Display',serif;
  }
  .story-takeaway {
    margin-top:1.6rem;padding:1.4rem 1.6rem;border-radius:16px;border:2px solid;
    font-size:0.9rem;color:#444;line-height:1.7;
  }
  .takeaway-label { font-weight:700;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem;display:block; }

  .back-to-stories-btn {
    display:block;text-align:center;background:var(--ink);color:white;
    font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.95rem;
    padding:1rem 2rem;border-radius:100px;border:none;cursor:pointer;
    margin-top:2.4rem;transition:opacity 0.15s;
    box-shadow:3px 3px 0 var(--rose);
  }
  .back-to-stories-btn:hover { opacity:0.85; }

  .top-nav { position:fixed;top:0;left:0;right:0;z-index:100;padding:1.1rem 2rem;pointer-events:none;display:flex;align-items:center; }
  .nav-logo {
    font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--ink);
    pointer-events:all;cursor:pointer;opacity:0;transition:opacity 0.3s;
    background:rgba(255,248,248,0.9);padding:6px 16px;border-radius:100px;
    border:1.5px solid #ddd;backdrop-filter:blur(8px);border:none;
  }
  .nav-logo.visible { opacity:1; }
</style>
</head>
<body>

<nav class="top-nav">
  <button class="nav-logo" id="navLogo" onclick="showHero()">&#127752; Real Stories</button>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="pride-bar"></div>
  <div class="hero-orbs">
    <div class="orb orb1"></div><div class="orb orb2"></div>
    <div class="orb orb3"></div><div class="orb orb4"></div>
  </div>
  <div class="hero-badge">
    <div class="flag-dots">
      <span style="background:#b55690"></span><span style="background:#d262a6"></span>
      <span style="background:#e0a0c0"></span><span style="background:#e5638b"></span>
      <span style="background:#a50062"></span>
    </div>
    Lesbian Voices
  </div>
  <h1 class="hero-title">Real Stories of <em>Lesbian Women</em></h1>
  <p class="hero-sub">Eight women. Eight journeys. One truth — you are not alone, and your love is valid.</p>
  <p class="hero-quote">"Loving women is one of the bravest and most beautiful things I have ever done."</p>
  <button class="cta-btn" onclick="showStories()">Read the Stories</button>
</section>

<!-- STORIES LIST -->
<section id="stories-list">
  <div class="section-header">
    <h2>Choose a Story</h2>
    <p>Every path is real. Every love is valid.</p>
  </div>
  <div class="story-cards" id="cardsContainer"></div>
</section>

<!-- STORY DETAIL -->
<section id="story-detail">
  <button class="back-btn" onclick="showStories()">← All Stories</button>
  <div id="detailContent"></div>
</section>

function makeAvatarSVG(bg1, bg2, skin, hair, hairStyle, accent) {
  const hairShapes = {
    long:  `<ellipse cx="20" cy="11" rx="8" ry="10" fill="${hair}"/>
             <rect x="12" y="13" width="3" height="12" rx="1.5" fill="${hair}"/>
             <rect x="25" y="13" width="3" height="12" rx="1.5" fill="${hair}"/>`,
    short: `<ellipse cx="20" cy="11" rx="7.5" ry="6.5" fill="${hair}"/>`,
    curly: `<ellipse cx="20" cy="11" rx="8.5" ry="8" fill="${hair}"/>
             <circle cx="14" cy="12" r="2.8" fill="${hair}"/>
             <circle cx="26" cy="12" r="2.8" fill="${hair}"/>`,
    bun:   `<ellipse cx="20" cy="12" rx="7" ry="5.5" fill="${hair}"/>
             <circle cx="20" cy="7" r="2.8" fill="${hair}"/>`,
    bob:   `<ellipse cx="20" cy="13" rx="8" ry="7" fill="${hair}"/>
             <rect x="12" y="13" width="3" height="7" rx="1.5" fill="${hair}"/>
             <rect x="25" y="13" width="3" height="7" rx="1.5" fill="${hair}"/>`,
  };
  return `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="av_${bg1.replace('#','')}" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="${bg1}"/><stop offset="100%" stop-color="${bg2}"/>
  </linearGradient></defs>
  <rect width="40" height="40" fill="url(#av_${bg1.replace('#','')})" rx="20"/>
  <ellipse cx="20" cy="34" rx="11" ry="7.5" fill="${accent}"/>
  <rect x="18" y="22.5" width="4" height="4" rx="1.2" fill="${skin}"/>
  <ellipse cx="20" cy="18" rx="7.2" ry="8.2" fill="${skin}"/>
  ${hairShapes[hairStyle] || hairShapes['long']}
  <circle cx="17" cy="17.5" r="1.2" fill="#2c1810"/>
  <circle cx="23" cy="17.5" r="1.2" fill="#2c1810"/>
  <path d="M17 21.5 Q20 23.5 23 21.5" stroke="#c0605a" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>`;
}

    story:[

      "When I was twenty-one, I kissed a woman at a party. Not because I planned to. Because she was there and she looked at me and something in me moved that had never moved before. I walked home at two in the morning and sat on my kitchen floor for an hour. I was not upset. I was just processing the fact that everything made sense now.",
      "Coming out to my friends was easy. They had apparently all been waiting. My mother took longer. She had a version of my future that included a husband and children and she needed time to rearrange it. What she eventually said, six months later, was: I just want you to be loved. And I told her that was exactly what I was.",

      "I found the word lesbian online when I was seventeen. I read it and felt something so unfamiliar it took me a while to identify it as relief. There was a word. There were other people. I was not an anomaly in a world that had no name for me. I was part of something that had existed for a very long time.",
      "Coming out in a South Asian context is layered. There is the personal coming out, and then there is the cultural one, which involves not just your family but an entire community that sees your life as a shared project. I am still navigating both. My parents know. Some relatives do not. I have made peace with the fact that this may take years.",

      "I have been in therapy for four years. My therapist has been an important part of helping me understand that my sexuality and my mental health are separate things that happened to be happening at the same time. Being lesbian did not cause my anxiety. Hiding did.",

      "I was fourteen when I wrote it down. I knew then. I put the diary under my mattress and did not look at it again for three years. When I eventually found it and read those pages, I did not recognise the handwriting as mine for a moment. And then I did. And I sat with that girl and her certainty and felt something that took a while to name, which was grief, for all the years I had spent arguing with what she had already known.",

function showHero() {
  document.getElementById('hero').style.display='flex';
  document.getElementById('stories-list').style.display='none';
  document.getElementById('story-detail').style.display='none';
  document.getElementById('navLogo').classList.remove('visible');
}

function showStories() {
  document.getElementById('hero').style.display='none';
  document.getElementById('stories-list').style.display='block';
  document.getElementById('story-detail').style.display='none';
  document.getElementById('navLogo').classList.add('visible');
  renderCards();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  stories.forEach((s,i) => {
    const card = document.createElement('div');
    card.className = 'story-card';
    const hasPhoto = PHOTO_AVATARS[i];
    const avatarHTML = hasPhoto
      ? `<img src="${PHOTO_AVATARS[i]}" alt="${s.name}"/>`
      : s.avatar;
    card.innerHTML = `
      <div class="card-stripe" style="background:${s.color.stripe}"></div>
      <div class="card-body-s">
        <div class="card-top">
          <div class="card-avatar" style="border-color:${s.color.stripe}">${avatarHTML}</div>
          <div class="card-name">${s.name}, ${s.age}<span class="card-tag" style="background:${s.color.tagBg};color:${s.color.tagText}">${s.identity}</span></div>
        </div>
        <div class="card-quote">"${s.quote}"</div>
      </div>
    `;
    card.onclick = () => showStory(i);
    container.appendChild(card);
  });
}

function showStory(index) {
  const s = stories[index];
  document.getElementById('hero').style.display='none';
  document.getElementById('stories-list').style.display='none';
  document.getElementById('story-detail').style.display='block';
  document.getElementById('navLogo').classList.add('visible');

  const hasPhoto = PHOTO_PORTRAITS[index];
  const portraitHTML = hasPhoto
    ? `<img src="${PHOTO_PORTRAITS[index]}" alt="${s.name}"/>`
    : `<div style="width:100%;height:220px;background:linear-gradient(135deg,${s.color.tagBg},${s.color.hlBg});border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:4rem;">&#128149;</div>`;

  const storyParas = s.story.map(p=>`<p>${p}</p>`).join('');
  document.getElementById('detailContent').innerHTML = `
    <div class="story-hero-band"></div>
    <h1 class="story-name-large">${s.name}, ${s.age}</h1>
    <span class="story-identity-badge" style="background:${s.color.tagBg};color:${s.color.tagText};border-color:${s.color.border}">${s.identity}</span>
    <div class="portrait-wrap">${portraitHTML}</div>
    <div class="story-body">${storyParas}</div>
    <div class="story-highlight" style="border-color:${s.color.border};background:${s.color.hlBg};color:${s.color.tagText}">"${s.highlight}"</div>
    <div class="story-takeaway" style="border-color:${s.color.border};background:${s.color.takeBg}">
      <span class="takeaway-label" style="color:${s.color.tagText}">Something to sit with</span>
      ${s.takeaway}
    </div>
    <button class="back-to-stories-btn" onclick="showStories()">← Back to All Stories</button>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}

showHero();
</script>
