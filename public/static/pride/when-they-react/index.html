<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>When They React — Navigating Family and Friends</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;0,900;1,300;1,500;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; }

/* ── Background ── */
body { background:#f0f4ff; }
.bg {
  position:fixed; inset:0; z-index:0;
  background:linear-gradient(160deg, #eef2ff 0%, #fdf2f8 45%, #f0fdf4 100%);
}
.bg-blob { position:absolute; border-radius:50%; filter:blur(85px); opacity:0.42; will-change:transform; }
.bb1 { width:500px;height:500px;background:#c7d2fe;top:-150px;left:-130px; animation:bv1 18s ease-in-out infinite alternate; }
.bb2 { width:420px;height:420px;background:#fbcfe8;bottom:-100px;right:-100px; animation:bv2 22s ease-in-out infinite alternate; }
.bb3 { width:320px;height:320px;background:#bbf7d0;top:30%;right:-60px; animation:bv1 15s ease-in-out infinite alternate-reverse; }
.bb4 { width:260px;height:260px;background:#fde68a;bottom:15%;left:-50px;opacity:0.3; animation:bv2 20s ease-in-out infinite alternate; }
@keyframes bv1 { from{transform:translate(0,0)} to{transform:translate(30px,22px)} }
@keyframes bv2 { from{transform:translate(0,0)} to{transform:translate(-24px,-18px)} }

/* ── Stage ── */
.stage {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:1rem 1.2rem; gap:0.8rem;
}

/* ── Progress ── */
.prog-wrap { width:100%; max-width:440px; display:flex; align-items:center; gap:10px; }
.prog-track { flex:1; height:4px; background:rgba(99,102,241,0.12); border-radius:100px; overflow:hidden; }
.prog-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,#818cf8,#f472b6); transition:width 0.6s cubic-bezier(0.22,1,0.36,1); }
.prog-label { font-size:0.74rem; font-weight:600; color:rgba(99,102,241,0.55); min-width:36px; text-align:right; letter-spacing:0.04em; }

/* ── Card stack ── */
.card-stack {
  width:100%; max-width:440px;
  position:relative;
  height:clamp(500px, 72vh, 600px);
}

.card {
  position:absolute; inset:0;
  border-radius:30px;
  padding:0;
  display:flex; flex-direction:column;
  box-shadow:0 20px 56px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.05);
  transition:transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
  will-change:transform; overflow:hidden; user-select:none; cursor:grab;
}
.card.hidden  { opacity:0; transform:translateX(115%) rotate(8deg); pointer-events:none; }
.card.active  { opacity:1; transform:translateX(0) rotate(0); z-index:5; }
.card.prev    { opacity:0; transform:translateX(-115%) rotate(-8deg); pointer-events:none; }
.card.behind1 { opacity:0.55; transform:scale(0.93) translateY(14px); z-index:4; pointer-events:none; }
.card.behind2 { opacity:0.3;  transform:scale(0.87) translateY(26px); z-index:3; pointer-events:none; }
.card.swiping { transition:none; }

/* Card themes */
.t1 { background:linear-gradient(155deg,#eef2ff,#e0e7ff); }
.t2 { background:linear-gradient(155deg,#fdf2f8,#fce7f3); }
.t3 { background:linear-gradient(155deg,#fff7ed,#ffedd5); }
.t4 { background:linear-gradient(155deg,#f0fdf4,#dcfce7); }
.t5 { background:linear-gradient(155deg,#fdf4ff,#f3e8ff); }
.t6 { background:linear-gradient(155deg,#eff6ff,#dbeafe); }
.t7 { background:linear-gradient(155deg,#fff1f2,#ffe4e6); }
.t8 { background:linear-gradient(155deg,#f0fdfa,#ccfbf1); }
.t9 { background:linear-gradient(155deg,#fffbeb,#fef3c7); }
.t10{ background:linear-gradient(155deg,#fdf2f8,#e0e7ff); }

/* Card deco circles */
.cdeco { position:absolute; border-radius:50%; pointer-events:none; }
.cd1 { width:240px;height:240px;top:-80px;right:-80px;background:rgba(255,255,255,0.35); }
.cd2 { width:160px;height:160px;bottom:-55px;left:-55px;background:rgba(255,255,255,0.28); }

/* ── Card top band ── */
.card-band { height:5px; width:100%; flex-shrink:0; }

/* ── Card body ── */
.card-body-wrap {
  padding:1.5rem 1.8rem 1.5rem;
  display:flex; flex-direction:column;
  flex:1; overflow:hidden;
}

/* Eyebrow */
.card-eye {
  font-size:0.67rem; font-weight:700; letter-spacing:0.14em;
  text-transform:uppercase; margin-bottom:0.3rem;
  display:flex; align-items:center; gap:6px; opacity:0.7;
}

/* Title */
.card-title {
  font-family:'Fraunces',serif; font-weight:700;
  font-size:clamp(1.3rem,3.8vw,1.65rem); line-height:1.22;
  margin-bottom:0.75rem; color:#1e1b4b;
}
.card-title em { font-style:italic; font-weight:500; }

/* Body text */
.card-text {
  font-size:0.9rem; font-weight:300; line-height:1.78;
  color:#374151; margin-bottom:0.75rem; flex:1;
}

/* ── Scenario blocks (reaction cards) ── */
.scenarios { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:0.75rem; }
.scenario {
  border-radius:14px; padding:0.75rem 1rem;
  display:flex; align-items:flex-start; gap:10px;
  border-left:3px solid;
  animation:scIn 0.45s ease both;
}
.scenario:nth-child(1){ animation-delay:0.08s; }
.scenario:nth-child(2){ animation-delay:0.2s; }
.scenario:nth-child(3){ animation-delay:0.32s; }
@keyframes scIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
.sc-ic { font-size:1.1rem; flex-shrink:0; margin-top:1px; }
.sc-text { font-size:0.86rem; font-weight:500; line-height:1.55; color:#1e1b4b; }
.sc-sub { font-size:0.78rem; font-weight:300; color:#6b7280; margin-top:2px; line-height:1.45; }

/* ── Reminder box ── */
.reminder {
  border-radius:16px; padding:0.9rem 1.1rem;
  border:1.5px solid; margin-bottom:0.75rem;
  animation:fadeSlide 0.5s ease both 0.15s;
}
@keyframes fadeSlide { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.reminder-title { font-size:0.68rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.35rem; }
.reminder-text { font-family:'Fraunces',serif; font-style:italic; font-size:1.1rem; font-weight:500; line-height:1.55; }

/* ── Step list ── */
.steps { display:flex; flex-direction:column; gap:0.45rem; margin-bottom:0.75rem; }
.step {
  display:flex; align-items:center; gap:9px;
  border-radius:12px; padding:0.6rem 0.9rem;
  font-size:0.87rem; font-weight:500; line-height:1.5;
  animation:scIn 0.4s ease both;
}
.step:nth-child(1){ animation-delay:0.05s; }
.step:nth-child(2){ animation-delay:0.15s; }
.step:nth-child(3){ animation-delay:0.25s; }
.step:nth-child(4){ animation-delay:0.35s; }
.step-ic { font-size:1rem; flex-shrink:0; }

/* ── Quote strip ── */
.quote-strip {
  border-radius:14px; padding:0.85rem 1.1rem;
  margin-bottom:0.75rem; position:relative;
  border-left:4px solid;
  animation:fadeSlide 0.5s ease both 0.2s;
}
.qs-mark { font-family:'Fraunces',serif; font-size:2.5rem; line-height:0.4; opacity:0.25; display:block; margin-bottom:0.35rem; }
.qs-text { font-family:'Fraunces',serif; font-style:italic; font-size:1.05rem; font-weight:500; line-height:1.55; }
.qs-attr { font-size:0.72rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; margin-top:0.4rem; opacity:0.55; }

/* ── Affirmation row ── */
.affirm-rows { display:flex; flex-direction:column; gap:0.55rem; margin-bottom:0.75rem; }
.affirm-row {
  border-left:3px solid; border-radius:0 14px 14px 0;
  padding:0.8rem 1.2rem;
  font-family:'Fraunces',serif; font-style:italic; font-weight:700;
  font-size:1.08rem; line-height:1.45;
  opacity:0; animation:scIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
}
.affirm-row:nth-child(1){ animation-delay:0.1s; }
.affirm-row:nth-child(2){ animation-delay:0.26s; }
.affirm-row:nth-child(3){ animation-delay:0.42s; }

/* ── Button ── */
.card-btn {
  width:100%; min-height:50px; border-radius:100px;
  border:none; cursor:pointer; margin-top:auto; flex-shrink:0;
  font-family:'DM Sans',sans-serif; font-weight:600;
  font-size:0.88rem; letter-spacing:0.06em; text-transform:uppercase;
  color:white; display:flex; align-items:center; justify-content:center; gap:7px;
  transition:transform 0.15s ease, box-shadow 0.15s ease;
}
.card-btn:hover { transform:translateY(-2px); }
.card-btn:active { transform:scale(0.97); }

/* ── Swipe hint ── */
.swipe-hint { font-size:0.73rem; color:rgba(99,102,241,0.4); letter-spacing:0.04em; }

/* ── Finish stage ── */
#finishStage {
  display:none; position:fixed; inset:0; z-index:20;
  align-items:center; justify-content:center; padding:2rem;
}
#finishStage.show { display:flex; }
.finish-bg {
  position:absolute; inset:0;
  background:linear-gradient(135deg,#818cf8,#f472b6,#34d399);
  background-size:300% 300%;
  animation:bgShift 8s ease infinite;
}
@keyframes bgShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

.finish-inner {
  position:relative; z-index:1;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1.5px solid rgba(255,255,255,0.45);
  border-radius:32px; padding:2.4rem 2rem;
  max-width:400px; width:100%;
  display:flex; flex-direction:column; align-items:center; text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,0.12);
  animation:popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn { from{opacity:0;transform:scale(0.82)} to{opacity:1;transform:scale(1)} }

.finish-emoji { font-size:3.8rem; margin-bottom:0.9rem; }
.finish-flag { display:flex; gap:3px; height:4px; width:80px; border-radius:100px; overflow:hidden; margin:0 auto 1.2rem; }
.finish-flag span { flex:1; }
.finish-title {
  font-family:'Fraunces',serif; font-size:clamp(1.8rem,5vw,2.6rem);
  font-weight:900; color:white; line-height:1.18; margin-bottom:0.7rem;
  text-shadow:0 2px 20px rgba(0,0,0,0.12);
}
.finish-title em { font-style:italic; color:#fce7f3; }
.finish-sub { font-size:0.92rem; font-weight:300; color:rgba(255,255,255,0.88); line-height:1.8; max-width:320px; margin-bottom:1.6rem; }
.finish-btn {
  background:rgba(255,255,255,0.28); border:2px solid rgba(255,255,255,0.6);
  border-radius:100px; padding:0.85rem 2.2rem;
  font-family:'DM Sans',sans-serif; font-weight:600; font-size:0.88rem;
  letter-spacing:0.06em; color:white; cursor:pointer;
  transition:background 0.15s, transform 0.12s; backdrop-filter:blur(8px);
}
.finish-btn:hover { background:rgba(255,255,255,0.42); transform:translateY(-1px); }

/* Confetti */
.conf-box { position:fixed;inset:0;z-index:99;pointer-events:none;overflow:hidden; }
.conf { position:absolute; animation:confFall linear forwards; }
@keyframes confFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(520deg);opacity:0} }
</style>

</head>

<body>

<div class="bg">
  <div class="bg-blob bb1"></div><div class="bg-blob bb2"></div>
  <div class="bg-blob bb3"></div><div class="bg-blob bb4"></div>
</div>
<div class="conf-box" id="confBox"></div>

<div class="stage" id="mainStage">
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:10%"></div></div>
    <span class="prog-label" id="progLabel">1 / 10</span>
  </div>
  <div class="card-stack" id="cardStack"></div>
  <div class="swipe-hint">Swipe or tap to continue</div>
</div>

<div id="finishStage">
  <div class="finish-bg"></div>
  <div class="finish-inner">
    <div class="finish-emoji">&#127752;</div>
    <div class="finish-flag">
      <span style="background:#ef4444"></span>
      <span style="background:#f97316"></span>
      <span style="background:#facc15"></span>
      <span style="background:#22c55e"></span>
      <span style="background:#3b82f6"></span>
      <span style="background:#a855f7"></span>
    </div>
    <h1 class="finish-title">You are not <em>defined</em><br>by their reaction.</h1>
    <p class="finish-sub">Whatever response you received or fear you might receive, your identity is valid, complete, and entirely yours. You deserve people who rise to meet you.</p>
    <button class="finish-btn" onclick="restart()">Start again &#8635;</button>
  </div>
</div>

<script>
const CARDS = [
  // ── Card 1: Welcome ──
  {
    theme:'t1', band:'linear-gradient(90deg,#818cf8,#a78bfa)',
    btn:'#6366f1', btnSh:'rgba(99,102,241,0.3)',
    eye:'&#127752; Your Journey',
    title:'When They React',
    content(){ return `
      <p class="card-text">Coming out can bring many kinds of responses. Some warm. Some silent. Some painful. This activity helps you understand, process, and navigate what happens when the people in your life react to who you are.</p>
      <div class="reminder" style="background:#eef2ff;border-color:#818cf8;">
        <div class="reminder-title" style="color:#6366f1">Remember</div>
        <div class="reminder-text" style="color:#1e1b4b">Their reaction is about them. Your identity is about you.</div>
      </div>
    `},
    btn_label:'Begin &#10022;'
  },

  // ── Card 2: Types of reactions ──
  {
    theme:'t2', band:'linear-gradient(90deg,#f472b6,#fb7185)',
    btn:'#ec4899', btnSh:'rgba(236,72,153,0.3)',
    eye:'&#128172; What You Might Face',
    title:'Reactions Come in Many Forms',
    content(){ return `
      <p class="card-text">People respond differently. None of their reactions define your worth.</p>
      <div class="scenarios">
        <div class="scenario" style="background:#fdf2f8;border-left-color:#f472b6">
          <span class="sc-ic">&#128557;</span>
          <div><div class="sc-text">Shock or silence</div><div class="sc-sub">They do not know what to say. Give them time.</div></div>
        </div>
        <div class="scenario" style="background:#fff1f2;border-left-color:#fb7185">
          <span class="sc-ic">&#128544;</span>
          <div><div class="sc-text">Anger or rejection</div><div class="sc-sub">This hurts deeply. It is not your fault.</div></div>
        </div>
        <div class="scenario" style="background:#fdf2f8;border-left-color:#e879f9">
          <span class="sc-ic">&#128517;</span>
          <div><div class="sc-text">Denial or minimising</div><div class="sc-sub">They say it is a phase. You know yourself best.</div></div>
        </div>
      </div>
    `},
    btn_label:'Next &#8594;'
  },

  // ── Card 3: Positive reactions ──
  {
    theme:'t4', band:'linear-gradient(90deg,#34d399,#6ee7b7)',
    btn:'#059669', btnSh:'rgba(5,150,105,0.3)',
    eye:'&#127808; When It Goes Well',
    title:'Some Will Surprise You With Love',
    content(){ return `
      <p class="card-text">Not every reaction will be hard. Some people will show up for you in ways that take your breath away.</p>
      <div class="scenarios">
        <div class="scenario" style="background:#f0fdf4;border-left-color:#34d399">
          <span class="sc-ic">&#129309;</span>
          <div><div class="sc-text">Immediate acceptance</div><div class="sc-sub">They say: I love you. That has not changed.</div></div>
        </div>
        <div class="scenario" style="background:#f0fdf4;border-left-color:#10b981">
          <span class="sc-ic">&#128149;</span>
          <div><div class="sc-text">Quiet solidarity</div><div class="sc-sub">They do not make it a big moment. They just stay.</div></div>
        </div>
        <div class="scenario" style="background:#f0fdf4;border-left-color:#6ee7b7">
          <span class="sc-ic">&#127775;</span>
          <div><div class="sc-text">Celebration</div><div class="sc-sub">They are proud of you for trusting them.</div></div>
        </div>
      </div>
    `},
    btn_label:'Next &#8594;'
  },

  // ── Card 4: Breathe and ground ──
  {
    theme:'t6', band:'linear-gradient(90deg,#60a5fa,#818cf8)',
    btn:'#3b82f6', btnSh:'rgba(59,130,246,0.3)',
    eye:'&#128168; Ground Yourself',
    title:'Before You Respond, Breathe',
    content(){ return `
      <p class="card-text">When a reaction lands hard, your nervous system wants to react immediately. Here is what to do first.</p>
      <div class="steps">
        <div class="step" style="background:#eff6ff;color:#1e3a8a"><span class="step-ic">&#128168;</span>Take one slow breath before speaking</div>
        <div class="step" style="background:#eff6ff;color:#1e3a8a"><span class="step-ic">&#129504;</span>Notice where you feel the reaction in your body</div>
        <div class="step" style="background:#eff6ff;color:#1e3a8a"><span class="step-ic">&#128100;</span>Remind yourself: this is their process, not yours</div>
        <div class="step" style="background:#eff6ff;color:#1e3a8a"><span class="step-ic">&#127968;</span>You do not owe anyone a perfect response right now</div>
      </div>
    `},
    btn_label:'Next &#8594;'
  },

  // ── Card 5: When family rejects ──
  {
    theme:'t7', band:'linear-gradient(90deg,#fb923c,#f87171)',
    btn:'#ef4444', btnSh:'rgba(239,68,68,0.3)',
    eye:'&#128166; Family Rejection',
    title:'When Family Does Not Accept You',
    content(){ return `
      <p class="card-text">Family rejection is one of the most painful experiences. If this happens to you, these truths matter.</p>
      <div class="affirm-rows">
        <div class="affirm-row" style="background:#fff1f2;border-left-color:#f87171;color:#991b1b">You are not broken or wrong.</div>
        <div class="affirm-row" style="background:#fff7ed;border-left-color:#fb923c;color:#9a3412">Your identity is not a problem to fix.</div>
        <div class="affirm-row" style="background:#fff1f2;border-left-color:#ef4444;color:#991b1b">Family of choice is real family.</div>
      </div>
      <div class="reminder" style="background:#fff1f2;border-color:#fca5a5;margin-bottom:0">
        <div class="reminder-title" style="color:#ef4444">Important</div>
        <div class="reminder-text" style="color:#7f1d1d;font-size:0.95rem">If you are unsafe at home, please reach out to a crisis line or LGBTQ+ support organisation.</div>
      </div>
    `},
    btn_label:'Next &#8594;'
  },

  // ── Card 6: When friends react badly ──
  {
    theme:'t5', band:'linear-gradient(90deg,#c084fc,#f472b6)',
    btn:'#9333ea', btnSh:'rgba(147,51,234,0.3)',
    eye:'&#128101; Friends',
    title:'When Friends Pull Away',
    content(){ return `
      <p class="card-text">Losing a friendship after coming out can feel like a second rejection. Here is how to hold yourself through it.</p>
      <div class="scenarios">
        <div class="scenario" style="background:#fdf4ff;border-left-color:#c084fc">
          <span class="sc-ic">&#128330;</span>
          <div><div class="sc-text">Give it time, not endless energy</div><div class="sc-sub">Some people need time to adjust. Do not chase endlessly.</div></div>
        </div>
        <div class="scenario" style="background:#fdf4ff;border-left-color:#e879f9">
          <span class="sc-ic">&#127801;</span>
          <div><div class="sc-text">Grieve the friendship honestly</div><div class="sc-sub">It is okay to mourn. That grief is real and valid.</div></div>
        </div>
        <div class="scenario" style="background:#fdf4ff;border-left-color:#a855f7">
          <span class="sc-ic">&#128125;</span>
          <div><div class="sc-text">Find your people</div><div class="sc-sub">LGBTQ+ community offers friendship that sees all of you.</div></div>
        </div>
      </div>
    `},
    btn_label:'Next &#8594;'
  },

  // ── Card 7: Difficult conversations ──
  {
    theme:'t3', band:'linear-gradient(90deg,#fb923c,#fbbf24)',
    btn:'#d97706', btnSh:'rgba(217,119,6,0.3)',
    eye:'&#128483; Hard Conversations',
    title:'You Do Not Have to Justify Yourself',
    content(){ return `
      <p class="card-text">When people ask intrusive questions or try to debate your identity, you are allowed to set limits.</p>
      <div class="steps">
        <div class="step" style="background:#fff7ed;color:#78350f"><span class="step-ic">&#128219;</span>It is okay to say: I am not discussing this right now</div>
        <div class="step" style="background:#fff7ed;color:#78350f"><span class="step-ic">&#129309;</span>You can love someone and still protect your peace</div>
        <div class="step" style="background:#fff7ed;color:#78350f"><span class="step-ic">&#127358;</span>Silence is a complete answer sometimes</div>
        <div class="step" style="background:#fff7ed;color:#78350f"><span class="step-ic">&#10024;</span>Your energy is precious. Spend it wisely</div>
      </div>
    `},
    btn_label:'Next &#8594;'
  },

  // ── Card 8: When people come around ──
  {
    theme:'t8', band:'linear-gradient(90deg,#2dd4bf,#34d399)',
    btn:'#0d9488', btnSh:'rgba(13,148,136,0.3)',
    eye:'&#127764; Growth Over Time',
    title:'Sometimes People Come Around',
    content(){ return `
      <p class="card-text">Some initial reactions are not final. People can grow, especially with time and love.</p>
      <div class="quote-strip" style="background:#f0fdfa;border-left-color:#2dd4bf">
        <span class="qs-mark" style="color:#2dd4bf">&#8220;</span>
        <p class="qs-text" style="color:#134e4a">My mother did not speak to me for a year. Now she asks about my partner by name and sends birthday cards. I did not know that was possible.</p>
        <p class="qs-attr" style="color:#0f766e">Shared by a community member</p>
      </div>
      <p class="card-text" style="margin-bottom:0">Do not write people off forever. But also do not put your healing on hold waiting for them.</p>
    `},
    btn_label:'Next &#8594;'
  },

  // ── Card 9: Building your support network ──
  {
    theme:'t9', band:'linear-gradient(90deg,#fbbf24,#f97316)',
    btn:'#d97706', btnSh:'rgba(245,158,11,0.3)',
    eye:'&#127760; Your Network',
    title:'Build Your Circle Intentionally',
    content(){ return `
      <p class="card-text">You deserve a support network that sees you fully. This can be built even when family is not available.</p>
      <div class="scenarios">
        <div class="scenario" style="background:#fffbeb;border-left-color:#fbbf24">
          <span class="sc-ic">&#128101;</span>
          <div><div class="sc-text">Find one affirming person</div><div class="sc-sub">One friend, mentor, or counsellor who fully accepts you.</div></div>
        </div>
        <div class="scenario" style="background:#fffbeb;border-left-color:#f59e0b">
          <span class="sc-ic">&#127760;</span>
          <div><div class="sc-text">Online communities count</div><div class="sc-sub">LGBTQ+ spaces online offer real belonging and connection.</div></div>
        </div>
        <div class="scenario" style="background:#fffbeb;border-left-color:#f97316">
          <span class="sc-ic">&#127968;</span>
          <div><div class="sc-text">Community organisations</div><div class="sc-sub">Many cities have LGBTQ+ centres, groups, and events.</div></div>
        </div>
      </div>
    `},
    btn_label:'Next &#8594;'
  },

  // ── Card 10: Affirmations to close ──
  {
    theme:'t10', band:'linear-gradient(90deg,#f472b6,#818cf8)',
    btn:'#8b5cf6', btnSh:'rgba(139,92,246,0.3)',
    eye:'&#128149; Carry This With You',
    title:'You Are Already Whole',
    content(){ return `
      <p class="card-text">Whatever reactions you have faced or are afraid of, these things remain true.</p>
      <div class="affirm-rows">
        <div class="affirm-row" style="background:#fdf2f8;border-left-color:#f472b6;color:#831843">Their acceptance does not create your worth.</div>
        <div class="affirm-row" style="background:#eef2ff;border-left-color:#818cf8;color:#312e81">You are allowed to protect yourself first.</div>
        <div class="affirm-row" style="background:#f5f3ff;border-left-color:#a78bfa;color:#4c1d95">You deserve love that does not require you to shrink.</div>
      </div>
    `},
    btn_label:'Finish &#127881;'
  }
];

let current = 0;
let isDragging=false, startX=0, dragX=0;
const CONF = ['#818cf8','#f472b6','#34d399','#fbbf24','#60a5fa','#c084fc','#fb923c'];

function buildCards() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';
  CARDS.forEach((d,i) => {
    const card = document.createElement('div');
    card.className = 'card ' + d.theme;
    card.id = 'card' + i;
    card.innerHTML = `
      <div class="cdeco cd1"></div>
      <div class="cdeco cd2"></div>
      <div class="card-band" style="background:${d.band}"></div>
      <div class="card-body-wrap">
        <div class="card-eye" style="color:${d.btn}">${d.eye}</div>
        <div class="card-title">${d.title}</div>
        ${d.content()}
        <button class="card-btn" style="background:${d.btn};box-shadow:0 5px 22px ${d.btnSh}" onclick="advance()">${d.btn_label}</button>
      </div>
    `;
    card.addEventListener('mousedown',  e => startDrag(e.clientX));
    card.addEventListener('touchstart', e => startDrag(e.touches[0].clientX), {passive:true});
    stack.appendChild(card);
  });
  updatePos();
}

function updatePos() {
  CARDS.forEach((_,i) => {
    const el = document.getElementById('card'+i);
    el.className = 'card ' + CARDS[i].theme;
    if      (i < current)       el.classList.add('prev');
    else if (i === current)     el.classList.add('active');
    else if (i === current+1)   el.classList.add('behind1');
    else if (i === current+2)   el.classList.add('behind2');
    else                        el.classList.add('hidden');
  });
  const pct = ((current+1)/CARDS.length)*100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = (current+1) + ' / ' + CARDS.length;
}

function advance() {
  current++;
  if (current >= CARDS.length) { showFinish(); return; }
  updatePos();
}

function showFinish() {
  document.getElementById('mainStage').style.display = 'none';
  document.getElementById('finishStage').classList.add('show');
  burst(80); setTimeout(() => burst(55), 800);
}

function restart() {
  current = 0;
  document.getElementById('finishStage').classList.remove('show');
  document.getElementById('mainStage').style.display = 'flex';
  buildCards();
}

function startDrag(x) {
  isDragging=true; startX=x; dragX=0;
  const el = document.getElementById('card'+current);
  if (el) el.classList.add('swiping');
  const onMove = cx => { if(!isDragging)return; dragX=cx-startX; const e=document.getElementById('card'+current); if(e) e.style.transform=`translateX(${dragX}px) rotate(${dragX*0.04}deg)`; };
  const onUp = () => { isDragging=false; const e=document.getElementById('card'+current); if(e){e.classList.remove('swiping');e.style.transform='';} if(Math.abs(dragX)>85)advance(); window.removeEventListener('mousemove',mm); window.removeEventListener('touchmove',tm); window.removeEventListener('mouseup',onUp); window.removeEventListener('touchend',onUp); };
  const mm = e => onMove(e.clientX);
  const tm = e => onMove(e.touches[0].clientX);
  window.addEventListener('mousemove', mm);
  window.addEventListener('touchmove', tm, {passive:true});
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchend', onUp);
}

function burst(count) {
  const box = document.getElementById('confBox');
  for (let i=0; i<count; i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    const size = Math.random()*10+5;
    c.style.cssText = `left:${Math.random()*100}%;top:-20px;width:${size}px;height:${size}px;background:${CONF[Math.floor(Math.random()*CONF.length)]};border-radius:${Math.random()>0.45?'50%':'3px'};animation-duration:${Math.random()*1.6+1}s;animation-delay:${Math.random()*0.5}s;`;
    box.appendChild(c);
    c.addEventListener('animationend', () => c.remove());
  }
}

buildCards();
</script>

  <div id="google_translate_element" style="display:none"></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang') || 'en';
        
        // Force cookie for Google Translate
        const domain = window.location.hostname;
        document.cookie = "googtrans=/en/" + lang + "; path=/; domain=" + domain;
        document.cookie = "googtrans=/en/" + lang + "; path=/";
        
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: true
        }, 'google_translate_element');
        
        // Periodically check and force the dropdown
        let attempts = 0;
        const interval = setInterval(() => {
            const select = document.querySelector('select.goog-te-combo');
            if (select) {
                if (select.value !== lang) {
                    select.value = lang;
                    select.dispatchEvent(new Event('change'));
                }
                attempts++;
                if (attempts > 10) clearInterval(interval);
            }
        }, 1000);
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
