<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesbian Icons Power Boost</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  font-family:'DM Sans', sans-serif;
  background:#fff0f5;
  touch-action:none;
}

/* ── Background ── */
.bg {
  position:fixed; inset:0; z-index:0;
  background:linear-gradient(135deg, #fff0f8 0%, #fce4ec 40%, #f3e5f5 100%);
}
.bg-orb {
  position:absolute; border-radius:50%; filter:blur(80px); opacity:0.4;
  will-change:transform;
}
.orb1 { width:500px;height:500px;background:#f8bbd0;top:-150px;left:-150px;animation:ob1 16s ease-in-out infinite alternate; }
.orb2 { width:400px;height:400px;background:#e1bee7;bottom:-100px;right:-100px;animation:ob2 20s ease-in-out infinite alternate; }
.orb3 { width:300px;height:300px;background:#fce4ec;top:30%;right:10%;animation:ob1 14s ease-in-out infinite alternate-reverse; }
@keyframes ob1 { from{transform:translate(0,0)}  to{transform:translate(40px,30px)} }
@keyframes ob2 { from{transform:translate(0,0)}  to{transform:translate(-30px,-25px)} }

/* ── Deck stage ── */
.deck-stage {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:1.5rem;
  gap:1.2rem;
}

/* ── Progress bar ── */
.progress-wrap {
  width:100%; max-width:420px;
  display:flex; align-items:center; gap:10px;
}
.progress-track {
  flex:1; height:4px; background:rgba(165,0,98,0.12);
  border-radius:100px; overflow:hidden;
}
.progress-fill {
  height:100%;
  background:linear-gradient(90deg,#b55690,#e91e8c);
  border-radius:100px;
  transition:width 0.5s cubic-bezier(0.22,1,0.36,1);
}
.progress-label {
  font-size:0.78rem; font-weight:500;
  color:rgba(165,0,98,0.55);
  letter-spacing:0.04em;
  min-width:32px; text-align:right;
}

/* ── Card stack ── */
.card-stack {
  width:100%; max-width:420px;
  position:relative;
  height:clamp(540px, 72vh, 640px);
}

.card {
  position:absolute; inset:0;
  border-radius:28px;
  padding:1.5rem 1.8rem 1.6rem;
  display:flex; flex-direction:column;
  transition:transform 0.45s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
  box-shadow:0 20px 60px rgba(0,0,0,0.1), 0 4px 20px rgba(0,0,0,0.06);
  cursor:grab;
  will-change:transform;
  overflow:hidden;
  user-select:none;
}

.card.hidden    { opacity:0; transform:translateX(110%) rotate(6deg); pointer-events:none; }
.card.active    { opacity:1; transform:translateX(0) rotate(0deg);    z-index:5; }
.card.prev      { opacity:0; transform:translateX(-110%) rotate(-6deg); pointer-events:none; }
.card.behind1   { opacity:0.6; transform:scale(0.93) translateY(18px); z-index:4; pointer-events:none; }
.card.behind2   { opacity:0.35; transform:scale(0.87) translateY(32px); z-index:3; pointer-events:none; }
.card.swiping   { transition:none; }

/* Card gradients */
.c1 { background:linear-gradient(145deg,#ff6b9d,#c44569); color:white; }
.c2 { background:linear-gradient(145deg,#a855f7,#7c3aed); color:white; }
.c3 { background:linear-gradient(145deg,#f59e0b,#d97706); color:white; }
.c4 { background:linear-gradient(145deg,#10b981,#059669); color:white; }
.c5 { background:linear-gradient(145deg,#3b82f6,#1d4ed8); color:white; }
.c6 { background:linear-gradient(145deg,#e91e8c,#9c27b0); color:white; }
.c7 { background:linear-gradient(145deg,#ef4444,#b91c1c); color:white; }
.c8 { background:linear-gradient(145deg,#6366f1,#4338ca); color:white; }

/* Decorative shapes on card */
.card-deco {
  position:absolute;
  border-radius:50%;
  opacity:0.12;
  pointer-events:none;
}
.deco-tl { width:220px;height:220px;top:-70px;left:-70px;background:white; }
.deco-br { width:180px;height:180px;bottom:-60px;right:-60px;background:white; }
.deco-sm { width:80px;height:80px;top:30%;right:-20px;background:white; }

/* ── Card top: icon ── */
.card-icon-wrap {
  width:64px; height:64px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:1.9rem;
  margin-bottom:0.8rem;
  border:2px solid rgba(255,255,255,0.3);
  flex-shrink:0;
}

/* ── Card content ── */
.card-label {
  font-size:0.7rem;
  font-weight:600;
  letter-spacing:0.12em;
  text-transform:uppercase;
  opacity:0.75;
  margin-bottom:0.4rem;
}

.card-title {
  font-family:'Playfair Display', serif;
  font-weight:700;
  font-size:clamp(1.25rem,3.5vw,1.6rem);
  line-height:1.2;
  margin-bottom:0.75rem;
  flex-shrink:0;
}

.card-text {
  font-size:0.92rem;
  font-weight:300;
  line-height:1.7;
  opacity:0.9;
  margin-bottom:0.7rem;
  flex:1;
}

.card-prompt {
  background:rgba(255,255,255,0.18);
  border-radius:14px;
  padding:0.7rem 1rem;
  font-size:0.85rem;
  font-style:italic;
  font-weight:300;
  line-height:1.55;
  opacity:0.95;
  margin-bottom:0.85rem;
  border:1px solid rgba(255,255,255,0.25);
  flex-shrink:0;
}

/* ── Card button ── */
.card-btn {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  background:rgba(255,255,255,0.25);
  color:white;
  border:2px solid rgba(255,255,255,0.5);
  border-radius:100px;
  padding:0.9rem 2.2rem;
  font-family:'DM Sans', sans-serif;
  font-weight:600;
  font-size:0.9rem;
  letter-spacing:0.05em;
  cursor:pointer;
  transition:background 0.15s, transform 0.12s;
  margin-top:auto;
  align-self:stretch;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  flex-shrink:0;
  min-height:52px;
}
.card-btn:hover { background:rgba(255,255,255,0.38); transform:translateY(-1px); }
.card-btn:active { transform:scale(0.97); }

.card-btn.celebrate-btn {
  background:rgba(255,255,255,0.3);
  width:100%;
  align-self:stretch;
  justify-content:center;
  font-size:0.95rem;
  min-height:52px;
}

/* ── Swipe hint ── */
.swipe-hint {
  font-size:0.78rem;
  color:rgba(165,0,98,0.45);
  font-weight:400;
  letter-spacing:0.04em;
  text-align:center;
}

/* ── Lesbian flag strip ── */
.flag-strip {
  display:flex; height:4px; border-radius:100px;
  overflow:hidden; gap:2px;
  width:80px; margin-bottom:0.7rem;
}
.flag-strip span { flex:1; border-radius:2px; }
.fs1{background:#b55690} .fs2{background:#d262a6} .fs3{background:rgba(255,255,255,0.6)} .fs4{background:#e5638b} .fs5{background:#a50062}

/* ── Confetti burst ── */
.confetti-container {
  position:fixed; inset:0; z-index:100; pointer-events:none;
  overflow:hidden;
}
.conf {
  position:absolute;
  width:10px; height:10px;
  border-radius:2px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform:translateY(-20px) rotate(0deg) scale(1); opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg) scale(0.5); opacity:0; }
}

/* ── Finish card ── */
.finish-screen {
  display:none;
  flex-direction:column;
  align-items:center;
  text-align:center;
  max-width:420px;
  width:100%;
  animation:fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
}
.finish-screen.show { display:flex; }
@keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

.finish-emoji { font-size:4rem; margin-bottom:1rem; animation:pop 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

.finish-title {
  font-family:'Playfair Display', serif;
  font-size:clamp(1.8rem,5vw,2.8rem);
  font-weight:700;
  color:#3d1a28;
  line-height:1.2;
  margin-bottom:0.9rem;
}
.finish-title em { font-style:italic; color:#d4437a; }

.finish-sub { font-size:0.98rem; font-weight:300; color:#9c6070; line-height:1.8; max-width:360px; margin-bottom:2rem; }

.restart-btn {
  background:rgba(212,67,122,0.1);
  color:#d4437a;
  border:1.5px solid rgba(212,67,122,0.3);
  border-radius:100px;
  padding:0.85rem 2.2rem;
  font-family:'DM Sans', sans-serif;
  font-weight:600;
  font-size:0.88rem;
  letter-spacing:0.06em;
  cursor:pointer;
  transition:background 0.15s, transform 0.12s;
}
.restart-btn:hover { background:rgba(212,67,122,0.18); transform:translateY(-1px); }
</style>

<!-- Auto-Translation Script -->
<script>
(function() {
  const urlParams = new URLSearchParams(window.location.search);
  let lang = urlParams.get('lang');
  if (lang) {
    // Map standard codes to Google Translate codes
    const langMap = {
      'zh-Hans': 'zh-CN',
      'zh-Hant': 'zh-TW',
    };
    lang = langMap[lang] || lang;
    if (lang !== 'en') {
      document.cookie = "googtrans=/en/" + lang + "; path=/";
      document.cookie = "googtrans=/en/" + lang + "; domain=" + window.location.hostname + "; path=/";
      
      const script = document.createElement('script');
      script.src = "https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
      document.head.appendChild(script);
      
      window.googleTranslateElementInit = function() {
        new google.translate.TranslateElement({pageLanguage: 'en', autoDisplay: false});
        // Hide the Google Translate banner
        const style = document.createElement('style');
        style.innerHTML = 'body { top: 0 !important; } .skiptranslate { display: none !important; }';
        document.head.appendChild(style);
      };
    } else {
      // Clear translation cookie if English
      document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
    }
  }
})();
</script>
</head>

<body>

<div class="bg">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>
</div>

<div class="confetti-container" id="confettiBox"></div>

<!-- Main deck -->
<div class="deck-stage" id="deckStage">
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:12.5%"></div></div>
    <span class="progress-label" id="progressLabel">1 / 8</span>
  </div>

  <div class="card-stack" id="cardStack"></div>

  <div class="swipe-hint" id="swipeHint">Swipe or tap the button to continue</div>
</div>

<!-- Finish screen -->
<div class="deck-stage" id="finishStage" style="display:none">
  <div class="finish-screen show">
    <div class="flag-strip"><span class="fs1"></span><span class="fs2"></span><span class="fs3"></span><span class="fs4"></span><span class="fs5"></span></div>
    <div class="finish-emoji">&#127881;</div>
    <h1 class="finish-title">You are <em>powerful,</em><br>loved, and seen.</h1>
    <p class="finish-sub">Every woman who has ever loved a woman has contributed to a legacy of courage and beauty. You are part of that story now and always.</p>
    <button class="restart-btn" onclick="restart()">Start again &#8635;</button>
  </div>
</div>

<script>
const CARDS = [
  {
    grad: 'c1',
    icon: '&#127752;',
    label: 'Your Heritage',
    title: "You're Part of Something Powerful",
    text: "Lesbian women have shaped culture, activism, art, and history across every continent and every era. The courage that came before you made space for you to exist openly.",
    prompt: null,
    btn: 'Next &#8594;',
    celebrate: false
  },
  {
    grad: 'c2',
    icon: '&#9997;&#65039;',
    label: 'Icons Who Paved the Way',
    title: "Trailblazers Exist Because of Courage",
    text: "Sappho wrote love poems to women 2600 years ago. Audre Lorde wrote: your silence will not protect you. Marlene Dietrich wore a suit on stage and kissed a woman in a crowd. They refused to disappear.",
    prompt: "Take a breath and appreciate the strength in your identity.",
    btn: 'Next &#8594;',
    celebrate: false
  },
  {
    grad: 'c3',
    icon: '&#10024;',
    label: 'You Belong Here',
    title: "You Belong in This Story",
    text: "Every lesbian life, every relationship, every act of self-acceptance adds to a community that is centuries deep. Your presence is not accidental. It is essential.",
    prompt: "Tap the screen when you feel proud of being yourself.",
    btn: 'Tap to Celebrate &#127881;',
    celebrate: true
  },
  {
    grad: 'c4',
    icon: '&#128149;',
    label: 'Love as Resistance',
    title: "Loving Freely Is an Act of Courage",
    text: "In a world that has not always made room for women who love women, choosing love openly is a radical act. It always has been. Every time you love without apology, you are rewriting the story.",
    prompt: "Think of one person who loves you as you are.",
    btn: 'Next &#8594;',
    celebrate: false
  },
  {
    grad: 'c5',
    icon: '&#128218;',
    label: 'Culture Makers',
    title: "Lesbians Built Culture",
    text: "Radclyffe Hall. Virginia Woolf. Frida Kahlo. Rita Mae Brown. Adrienne Rich. Alison Bechdel. These women did not just live, they created language and art that helped millions understand themselves.",
    prompt: "Which woman's story has ever made you feel less alone?",
    btn: 'Next &#8594;',
    celebrate: false
  },
  {
    grad: 'c6',
    icon: '&#9994;',
    label: 'Community Strength',
    title: "Your Community Has Always Survived",
    text: "Lesbian women have organized, protected each other, built bars and bookshops and housing cooperatives and health clinics. When the world looked away, the community looked inward and built anyway.",
    prompt: "Take a moment to feel grateful for the people who built before you.",
    btn: 'Next &#8594;',
    celebrate: false
  },
  {
    grad: 'c7',
    icon: '&#127775;',
    label: 'Visibility Matters',
    title: "Being Seen Changes Everything",
    text: "Every time a lesbian woman is visible, she makes it easier for the next girl to find herself. You being here, being honest, being open, is an act of care for someone you have never met.",
    prompt: "You are someone else's proof that it is possible.",
    btn: 'Next &#8594;',
    celebrate: false
  },
  {
    grad: 'c8',
    icon: '&#127881;',
    label: 'Celebrate You',
    title: "Your Pride Is Yours to Keep",
    text: "Pride is not just one day or one parade. It lives in the way you speak your truth, love your people, and refuse to make yourself smaller. Carry it with you every single day.",
    prompt: "Place a hand on your heart. You are exactly where you are meant to be.",
    btn: 'Finish with Pride &#9825;',
    celebrate: true
  }
];

let current = 0;
let isDragging = false;
let startX = 0;
let dragX = 0;
const CONF_COLOURS = ['#f72585','#b55690','#e91e8c','#ce93d8','#ffd166','#06d6a0','#4361ee'];

function buildCards() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';
  CARDS.forEach((data, i) => {
    const card = document.createElement('div');
    card.className = 'card ' + data.grad;
    card.id = 'card' + i;

    let promptHTML = data.prompt
      ? `<div class="card-prompt">${data.prompt}</div>`
      : '';

    let btnClass = data.celebrate ? 'card-btn celebrate-btn' : 'card-btn';

    card.innerHTML = `
      <div class="card-deco deco-tl"></div>
      <div class="card-deco deco-br"></div>
      <div class="card-deco deco-sm"></div>
      <div class="flag-strip">
        <span class="fs1"></span><span class="fs2"></span>
        <span class="fs3"></span><span class="fs4"></span><span class="fs5"></span>
      </div>
      <div class="card-icon-wrap">${data.icon}</div>
      <div class="card-label">${data.label}</div>
      <div class="card-title">${data.title}</div>
      <div class="card-text">${data.text}</div>
      ${promptHTML}
      <button class="${btnClass}" onclick="advance()">${data.btn}</button>
    `;

    // Drag support
    card.addEventListener('mousedown', e => startDrag(e.clientX));
    card.addEventListener('touchstart', e => startDrag(e.touches[0].clientX), {passive:true});

    stack.appendChild(card);
  });
  updatePositions();
}

function updatePositions() {
  CARDS.forEach((_, i) => {
    const el = document.getElementById('card' + i);
    el.className = 'card ' + CARDS[i].grad;
    if      (i < current)          el.classList.add('prev');
    else if (i === current)        el.classList.add('active');
    else if (i === current + 1)    el.classList.add('behind1');
    else if (i === current + 2)    el.classList.add('behind2');
    else                           el.classList.add('hidden');
  });

  const pct = ((current + 1) / CARDS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = (current + 1) + ' / ' + CARDS.length;
}

function advance() {
  if (CARDS[current] && CARDS[current].celebrate) {
    burst();
  }
  current++;
  if (current >= CARDS.length) {
    showFinish();
    return;
  }
  updatePositions();
}

function showFinish() {
  document.getElementById('deckStage').style.display = 'none';
  document.getElementById('finishStage').style.display = 'flex';
  burst();
  setTimeout(burst, 600);
}

function restart() {
  current = 0;
  document.getElementById('finishStage').style.display = 'none';
  document.getElementById('deckStage').style.display = 'flex';
  buildCards();
}

// Drag / swipe
function startDrag(x) {
  isDragging = true;
  startX = x;
  dragX = 0;
  const el = document.getElementById('card' + current);
  if (el) el.classList.add('swiping');

  const onMove = (ex) => {
    if (!isDragging) return;
    dragX = ex - startX;
    const el = document.getElementById('card' + current);
    if (el) el.style.transform = `translateX(${dragX}px) rotate(${dragX * 0.04}deg)`;
  };

  const onUp = () => {
    isDragging = false;
    const el = document.getElementById('card' + current);
    if (el) {
      el.classList.remove('swiping');
      el.style.transform = '';
    }
    if (Math.abs(dragX) > 90) advance();
    window.removeEventListener('mousemove', mMove);
    window.removeEventListener('touchmove', tMove);
    window.removeEventListener('mouseup', onUp);
    window.removeEventListener('touchend', onUp);
  };

  const mMove = e => onMove(e.clientX);
  const tMove = e => onMove(e.touches[0].clientX);
  window.addEventListener('mousemove', mMove);
  window.addEventListener('touchmove', tMove, {passive:true});
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchend', onUp);
}

// Confetti burst
function burst() {
  const box = document.getElementById('confettiBox');
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    const size = Math.random() * 10 + 5;
    c.style.cssText = `
      left:${Math.random()*100}%;
      top:-20px;
      width:${size}px;
      height:${size}px;
      background:${CONF_COLOURS[Math.floor(Math.random()*CONF_COLOURS.length)]};
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration:${Math.random()*1.5+1}s;
      animation-delay:${Math.random()*0.4}s;
    `;
    box.appendChild(c);
    c.addEventListener('animationend', () => c.remove());
  }
}

buildCards();
</script>

  <!-- Pride Localization Layer -->
  <div id="google_translate_element" style="display:none"></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang') || 'en';
        
        // Force cookie for Google Translate
        const domain = window.location.hostname;
        document.cookie = "googtrans=/en/" + lang + "; path=/; domain=" + domain;
        document.cookie = "googtrans=/en/" + lang + "; path=/";
        
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: true
        }, 'google_translate_element');
        
        // Periodically check and force the dropdown
        let attempts = 0;
        const interval = setInterval(() => {
            const select = document.querySelector('select.goog-te-combo');
            if (select) {
                if (select.value !== lang) {
                    select.value = lang;
                    select.dispatchEvent(new Event('change'));
                }
                attempts++;
                if (attempts > 10) clearInterval(interval);
            }
        }, 1000);
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
