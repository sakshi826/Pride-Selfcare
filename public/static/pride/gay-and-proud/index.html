<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gay and Proud</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;0,900;1,300;1,500;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; }
body { background:#fff8f0; }

/* ── Bright rainbow background ── */
.bg {
  position:fixed; inset:0; z-index:0;
  background:linear-gradient(160deg,#fff0f8 0%,#f0f4ff 50%,#f0fdf4 100%);
}
.bg-blob { position:absolute; border-radius:50%; filter:blur(85px); will-change:transform; }
.bb1 { width:500px;height:500px;background:#f87171;opacity:0.32;top:-150px;left:-130px; animation:bv1 20s ease-in-out infinite alternate; }
.bb2 { width:420px;height:420px;background:#818cf8;opacity:0.35;bottom:-100px;right:-100px; animation:bv2 24s ease-in-out infinite alternate; }
.bb3 { width:340px;height:340px;background:#34d399;opacity:0.32;top:30%;right:-60px; animation:bv1 17s ease-in-out infinite alternate-reverse; }
.bb4 { width:260px;height:260px;background:#fbbf24;opacity:0.4;bottom:15%;left:-50px; animation:bv2 19s ease-in-out infinite alternate; }
.bb5 { width:300px;height:300px;background:#f472b6;opacity:0.3;top:50%;left:30%; animation:bv1 16s ease-in-out infinite alternate; }
.bb6 { width:240px;height:240px;background:#4ade80;opacity:0.28;top:10%;right:20%; animation:bv2 21s ease-in-out infinite alternate-reverse; }
@keyframes bv1 { from{transform:translate(0,0)} to{transform:translate(28px,20px)} }
@keyframes bv2 { from{transform:translate(0,0)} to{transform:translate(-22px,-16px)} }

/* ── Stage ── */
.stage {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:1rem 1.2rem; gap:0.8rem;
}

/* ── Progress ── */
.prog-wrap { width:100%; max-width:440px; display:flex; align-items:center; gap:10px; }
.prog-track { flex:1; height:4px; background:rgba(0,0,0,0.08); border-radius:100px; overflow:hidden; }
.prog-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,#f87171,#fbbf24,#34d399,#60a5fa,#a855f7); transition:width 0.6s cubic-bezier(0.22,1,0.36,1); }
.prog-label { font-size:0.74rem; font-weight:600; color:rgba(79,70,229,0.5); min-width:36px; text-align:right; letter-spacing:0.04em; }

/* ── Card stack ── */
.card-stack {
  width:100%; max-width:440px;
  position:relative;
  height:clamp(500px, 72vh, 600px);
}

.card {
  position:absolute; inset:0;
  border-radius:28px;
  display:flex; flex-direction:column;
  box-shadow:0 16px 40px rgba(0,0,0,0.13), 0 4px 14px rgba(0,0,0,0.07);
  transition:transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
  will-change:transform; overflow:hidden; user-select:none; cursor:grab;
}
.card.hidden  { opacity:0; transform:translateX(115%) rotate(8deg); pointer-events:none; }
.card.active  { opacity:1; transform:translateX(0) rotate(0); z-index:5; }
.card.prev    { opacity:0; transform:translateX(-115%) rotate(-8deg); pointer-events:none; }
.card.behind1 { opacity:0.55; transform:scale(0.93) translateY(14px); z-index:4; pointer-events:none; }
.card.behind2 { opacity:0.3;  transform:scale(0.87) translateY(26px); z-index:3; pointer-events:none; }
.card.swiping { transition:none; }

/* Bright vivid card gradients */
.t1  { background:linear-gradient(145deg,#fff9e6,#fef3c7,#fde68a); }
.t2  { background:linear-gradient(145deg,#fff0f2,#fce7eb,#fda4af); }
.t3  { background:linear-gradient(145deg,#f0fdf8,#d1fae5,#a7f3d0); }
.t4  { background:linear-gradient(145deg,#eef2ff,#e0e7ff,#c7d2fe); }
.t5  { background:linear-gradient(145deg,#f0f9ff,#e0f2fe,#bae6fd); }
.t6  { background:linear-gradient(145deg,#fdf4ff,#fae8ff,#f0abfc); }
.t7  { background:linear-gradient(145deg,#fff5f5,#fee2e2,#fecaca); }
.t8  { background:linear-gradient(145deg,#f0fdf4,#dcfce7,#bbf7d0); }
.t9  { background:linear-gradient(145deg,#f5f3ff,#ede9fe,#ddd6fe); }
.t10 { background:linear-gradient(145deg,#fff9e6,#fef3c7,#ede9fe); }

/* Deco circles */
.cdeco { position:absolute; border-radius:50%; pointer-events:none; background:rgba(255,255,255,0.2); }
.cd1 { width:260px;height:260px;top:-90px;right:-90px; }
.cd2 { width:180px;height:180px;bottom:-60px;left:-60px; }

/* Card band */
.card-band { height:5px; width:100%; flex-shrink:0; }

/* Card body */
.card-body-wrap {
  padding:1.5rem 1.8rem 1.5rem;
  display:flex; flex-direction:column; flex:1; overflow:hidden;
}

.card-eye {
  font-size:0.67rem; font-weight:700; letter-spacing:0.14em;
  text-transform:uppercase; margin-bottom:0.3rem;
  display:flex; align-items:center; gap:6px;
  color:rgba(0,0,0,0.45);
}

.card-title {
  font-family:'Fraunces',serif; font-weight:900;
  font-size:clamp(1.3rem,3.8vw,1.7rem); line-height:1.2;
  margin-bottom:0.75rem; color:#1a1a2e;
}
.card-title em { font-style:italic; font-weight:700; color:rgba(0,0,0,0.6); }

.card-text {
  font-size:0.9rem; font-weight:400; line-height:1.78;
  color:rgba(0,0,0,0.65); margin-bottom:0.75rem; flex:1;
}

/* Scenario blocks */
.scenarios { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:0.75rem; }
.scenario {
  border-radius:14px; padding:0.75rem 1rem;
  display:flex; align-items:flex-start; gap:10px;
  background:rgba(255,255,255,0.32);
  border:1px solid rgba(255,255,255,0.55);
  border-left:3px solid rgba(255,255,255,0.8);
  animation:scIn 0.45s ease both;
}
.scenario:nth-child(1){ animation-delay:0.08s; }
.scenario:nth-child(2){ animation-delay:0.2s; }
.scenario:nth-child(3){ animation-delay:0.32s; }
@keyframes scIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
.sc-ic { font-size:1.1rem; flex-shrink:0; margin-top:1px; }
.sc-text { font-size:0.87rem; font-weight:700; line-height:1.5; color:#1a1a2e; }
.sc-sub  { font-size:0.78rem; font-weight:300; color:rgba(0,0,0,0.5); margin-top:2px; line-height:1.45; }

/* Steps */
.steps { display:flex; flex-direction:column; gap:0.45rem; margin-bottom:0.75rem; }
.step {
  display:flex; align-items:center; gap:9px;
  border-radius:12px; padding:0.6rem 0.9rem;
  background:rgba(255,255,255,0.32); border:1px solid rgba(255,255,255,0.55);
  font-size:0.87rem; font-weight:600; line-height:1.5; color:#1a1a2e;
  animation:scIn 0.4s ease both;
}
.step:nth-child(1){ animation-delay:0.05s; }
.step:nth-child(2){ animation-delay:0.15s; }
.step:nth-child(3){ animation-delay:0.25s; }
.step:nth-child(4){ animation-delay:0.35s; }
.step-ic { font-size:1rem; flex-shrink:0; }

/* Affirmation rows */
.affirm-rows { display:flex; flex-direction:column; gap:0.55rem; margin-bottom:0.75rem; }
.affirm-row {
  border-left:4px solid rgba(255,255,255,0.8);
  border-radius:0 16px 16px 0;
  padding:0.9rem 1.2rem;
  font-family:'Fraunces',serif; font-style:italic; font-weight:700;
  font-size:1.08rem; line-height:1.45;
  background:rgba(255,255,255,0.3); color:#1a1a2e;
  opacity:0; animation:scIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
}
.affirm-row:nth-child(1){ animation-delay:0.1s; }
.affirm-row:nth-child(2){ animation-delay:0.26s; }
.affirm-row:nth-child(3){ animation-delay:0.42s; }

/* Quote strip */
.quote-strip {
  border-radius:16px; padding:1rem 1.2rem;
  background:rgba(255,255,255,0.3); border:1px solid rgba(255,255,255,0.55);
  border-left:4px solid rgba(255,255,255,0.8); margin-bottom:0.75rem;
  animation:fadeSlide 0.5s ease both 0.15s;
}
@keyframes fadeSlide { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.qs-mark { font-family:'Fraunces',serif; font-size:2.5rem; line-height:0.4; opacity:0.3; color:#1a1a2e; display:block; margin-bottom:0.35rem; }
.qs-text { font-family:'Fraunces',serif; font-style:italic; font-size:1.05rem; font-weight:600; line-height:1.55; color:#1a1a2e; }
.qs-attr { font-size:0.72rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-top:0.4rem; color:rgba(0,0,0,0.4); }

/* Notice */
.notice {
  border-radius:14px; padding:0.85rem 1rem;
  background:rgba(255,255,255,0.3); border:1px solid rgba(255,255,255,0.55);
  font-size:0.86rem; font-style:italic; font-weight:400;
  color:#1a1a2e; line-height:1.6; margin-bottom:0.75rem;
  animation:fadeSlide 0.5s ease both 0.2s;
}

/* Breath orb */
.breath-center { display:flex; align-items:center; justify-content:center; margin-bottom:1.2rem; }
.breath-orb { position:relative; width:100px; height:100px; display:flex; align-items:center; justify-content:center; }
.bor { position:absolute; border-radius:50%; border:1.5px solid rgba(255,255,255,0.5); animation:breathP 4s ease-in-out infinite; }
.bor1 { width:60px; height:60px; }
.bor2 { width:80px; height:80px; animation-delay:0.5s; }
.bor3 { width:100px;height:100px;animation-delay:1s; }
.bor-core { width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:1.6rem;z-index:1;animation:breathP 4s ease-in-out infinite; }
@keyframes breathP { 0%,100%{transform:scale(1);opacity:0.65} 50%{transform:scale(1.14);opacity:1} }

/* Floating icons */
.float-icons { display:flex; justify-content:center; gap:1.2rem; margin-bottom:1rem; }
.float-ic {
  font-size:2rem;
  animation:iconFloat 3s ease-in-out infinite;
  display:inline-block;
}
.float-ic:nth-child(1){ animation-delay:0s; }
.float-ic:nth-child(2){ animation-delay:0.6s; }
.float-ic:nth-child(3){ animation-delay:1.2s; }
@keyframes iconFloat {
  0%,100%{ transform:translateY(0) rotate(-3deg); }
  50%    { transform:translateY(-10px) rotate(3deg); }
}

/* Rainbow strip */
.rainbow-strip {
  display:flex; height:7px; border-radius:100px;
  overflow:hidden; width:100%; margin-bottom:0.85rem;
  animation:fadeSlide 0.5s ease both 0.1s;
}
.rainbow-strip span { flex:1; }

/* Card button — NO hover effects */
.card-btn {
  width:100%; min-height:50px; border-radius:100px;
  border:none; cursor:pointer; margin-top:auto; flex-shrink:0;
  font-family:'DM Sans',sans-serif; font-weight:700;
  font-size:0.88rem; letter-spacing:0.06em; text-transform:uppercase;
  color:white; display:flex; align-items:center; justify-content:center; gap:7px;
  background:rgba(0,0,0,0.18);
  transition:opacity 0.15s;
}
.card-btn:hover { opacity:0.9; }
.card-btn:active { opacity:0.8; }

.swipe-hint { font-size:0.73rem; color:rgba(79,70,229,0.3); letter-spacing:0.04em; }

/* ── Finish ── */
#finishStage {
  display:none; position:fixed; inset:0; z-index:20;
  align-items:center; justify-content:center; padding:2rem;
}
#finishStage.show { display:flex; }
.finish-bg {
  position:absolute; inset:0;
  background:linear-gradient(135deg,#f87171,#fbbf24,#34d399,#60a5fa,#a855f7,#f472b6);
  background-size:400% 400%;
  animation:bgSh 6s ease infinite;
}
@keyframes bgSh { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
.finish-inner {
  position:relative; z-index:1;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
  border:1.5px solid rgba(255,255,255,0.6);
  border-radius:32px; padding:2.4rem 2rem;
  max-width:400px; width:100%;
  display:flex; flex-direction:column; align-items:center; text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,0.12);
  animation:popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn { from{opacity:0;transform:scale(0.82)} to{opacity:1;transform:scale(1)} }
.finish-emoji { font-size:3.8rem; margin-bottom:0.9rem; }
.finish-flag { display:flex; gap:3px; height:5px; width:90px; border-radius:100px; overflow:hidden; margin:0 auto 1.2rem; }
.finish-flag span { flex:1; }
.finish-title { font-family:'Fraunces',serif; font-size:clamp(1.8rem,5vw,2.6rem); font-weight:900; color:#1a1a2e; line-height:1.18; margin-bottom:0.7rem; }
.finish-title em { font-style:italic; color:#6366f1; }
.finish-sub { font-size:0.92rem; font-weight:400; color:rgba(0,0,0,0.65); line-height:1.8; max-width:320px; margin-bottom:1.6rem; }
.finish-btn { background:rgba(0,0,0,0.2); border:2px solid rgba(255,255,255,0.6); border-radius:100px; padding:0.85rem 2.2rem; font-family:'DM Sans',sans-serif; font-weight:700; font-size:0.88rem; letter-spacing:0.06em; color:white; cursor:pointer; transition:opacity 0.15s; }
.finish-btn:hover { opacity:0.85; }

/* Confetti */
.conf-box { position:fixed;inset:0;z-index:99;pointer-events:none;overflow:hidden; }
.conf { position:absolute; animation:confFall linear forwards; }
@keyframes confFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(520deg);opacity:0} }
</style>

<script>
(function() {

</head>

<body>

<div class="bg">
  <div class="bg-blob bb1"></div><div class="bg-blob bb2"></div>
  <div class="bg-blob bb3"></div><div class="bg-blob bb4"></div>
  <div class="bg-blob bb5"></div><div class="bg-blob bb6"></div>
</div>
<div class="conf-box" id="confBox"></div>

<div class="stage" id="mainStage">
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:10%"></div></div>
    <span class="prog-label" id="progLabel">1 / 10</span>
  </div>
  <div class="card-stack" id="cardStack"></div>
  <div class="swipe-hint">Swipe or tap to continue</div>
</div>

<div id="finishStage">
  <div class="finish-bg"></div>
  <div class="finish-inner">
    <div class="finish-emoji">&#127881;</div>
    <div class="finish-flag">
      <span style="background:#ef4444"></span><span style="background:#f97316"></span>
      <span style="background:#facc15"></span><span style="background:#22c55e"></span>
      <span style="background:#3b82f6"></span><span style="background:#a855f7"></span>
    </div>
    <h1 class="finish-title">Gay and <em>gloriously</em> you.</h1>
    <p class="finish-sub">Pride is not a single day. It is every moment you choose to live honestly, love freely, and take up the space you deserve.</p>
    <button class="finish-btn" onclick="restart()">Start again &#8635;</button>
  </div>
</div>

<script>
const CARDS = [
  {
    theme:'t1', band:'linear-gradient(90deg,#f59e0b,#fb923c,#f97316)',
    eye:'&#127881; Welcome',
    title:'Gay and Proud',
    btnLabel:'Begin &#10022;',
    content(){ return `
      <div class="float-icons">
        <span class="float-ic">&#127752;</span>
        <span class="float-ic">&#10024;</span>
        <span class="float-ic">&#128149;</span>
      </div>
      <p class="card-text">Pride is more than a celebration. It is a declaration. This activity is your space to reconnect with the joy, power, and beauty of being a gay man.</p>
      <div class="affirm-rows">
        <div class="affirm-row">I am allowed to be proud of who I am.</div>
        <div class="affirm-row">My identity is a gift, not a burden.</div>
      </div>
    `}
  },
  {
    theme:'t2', band:'linear-gradient(90deg,#fb7185,#f43f5e,#e11d48)',
    eye:'&#128150; Your Identity',
    title:'Being Gay Is <em>Entirely</em> Valid',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">You do not need to justify, explain, or tone down who you are for anyone. Your identity is complete exactly as it is.</p>
      <div class="scenarios">
        <div class="scenario">
          <span class="sc-ic">&#127752;</span>
          <div><div class="sc-text">You are not a phase</div><div class="sc-sub">This is who you are, fully and permanently.</div></div>
        </div>
        <div class="scenario">
          <span class="sc-ic">&#10024;</span>
          <div><div class="sc-text">You are not too much</div><div class="sc-sub">Your joy, your love, your presence — all of it is welcome.</div></div>
        </div>
        <div class="scenario">
          <span class="sc-ic">&#128293;</span>
          <div><div class="sc-text">You are not alone</div><div class="sc-sub">Millions of gay men have walked this path before you.</div></div>
        </div>
      </div>
    `}
  },
  {
    theme:'t3', band:'linear-gradient(90deg,#34d399,#10b981,#059669)',
    eye:'&#127757; History',
    title:'You Stand on Brave Shoulders',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">Gay men have shaped art, culture, science, and history across every civilisation. Your identity carries that legacy.</p>
      <div class="scenarios">
        <div class="scenario">
          <span class="sc-ic">&#9997;&#65039;</span>
          <div><div class="sc-text">Oscar Wilde</div><div class="sc-sub">Chose truth over safety and gave the world unforgettable words.</div></div>
        </div>
        <div class="scenario">
          <span class="sc-ic">&#128187;</span>
          <div><div class="sc-text">Alan Turing</div><div class="sc-sub">Built the foundation of modern computing and was fearlessly himself.</div></div>
        </div>
        <div class="scenario">
          <span class="sc-ic">&#127926;</span>
          <div><div class="sc-text">Freddie Mercury</div><div class="sc-sub">Filled stadiums with love, power, and unapologetic presence.</div></div>
        </div>
      </div>
    `}
  },
  {
    theme:'t4', band:'linear-gradient(90deg,#818cf8,#6366f1,#4f46e5)',
    eye:'&#128168; Breathe',
    title:'Feel This Moment of Pride',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">Take a breath. Let yourself feel, fully and without apology, what it means to be gay and proud.</p>
      <div class="breath-center">
        <div class="breath-orb">
          <div class="bor bor3"></div>
          <div class="bor bor2"></div>
          <div class="bor bor1"></div>
          <div class="bor-core">&#127752;</div>
        </div>
      </div>
      <div class="steps">
        <div class="step"><span class="step-ic">&#128168;</span>Breathe in slowly for 4 counts</div>
        <div class="step"><span class="step-ic">&#10024;</span>Say: I am proud to be gay</div>
        <div class="step"><span class="step-ic">&#128149;</span>Let that truth sit in your chest</div>
      </div>
    `}
  },
  {
    theme:'t5', band:'linear-gradient(90deg,#38bdf8,#0ea5e9,#0284c7)',
    eye:'&#127760; Community',
    title:'Your Community Is <em>Extraordinary</em>',
    btnLabel:'Next &#8594;',
    content(){ return `
      <p class="card-text">The gay community has survived, thrived, created, and celebrated through everything. You belong to something remarkable.</p>
      <div class="rainbow-strip">
        <span style="background:#ef4444"></span><span style="background:#f97316"></span>
        <span style="background:#facc15"></span><span style="background:#22c55e"></span>
        <span style="background:#3b82f6"></span><span style="background:#a855f7"></span>
      </div>
      <div class="scenarios">
        <div class="scenario">
          <span class="sc-ic">&#129309;</span>
          <div><div class="sc-text">Decades of solidarity</div><div class="sc-sub">Gay men showed up for each other through crisis and joy alike.</div></div>
        </div>
        <div class="scenario">
          <span class="sc-ic">&#128483;</span>
          <div><div class="sc-text">Culture and creativity</div><div class="sc-sub">Fashion, music, film, art — shaped profoundly by gay men.</div></div>
        </div>
        <div class="scenario">
          <span class="sc-ic">&#128170;</span>
          <div><div class="sc-text">Activism and courage</div><div class="sc-sub">Rights fought for and won, for you and every generation after.</div></div>
        </div>
      </div>
    `}
  },
  {

let current = 0, isDragging=false, startX=0, dragX=0;
const CONF = ['#f87171','#fbbf24','#34d399','#60a5fa','#a855f7','#f472b6','#fb923c','#4ade80'];

function buildCards() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';
  CARDS.forEach((d,i) => {
    const card = document.createElement('div');
    card.className = 'card ' + d.theme;
    card.id = 'card'+i;
    card.innerHTML = `
      <div class="cdeco cd1"></div>
      <div class="cdeco cd2"></div>
      <div class="card-band" style="background:${d.band}"></div>
      <div class="card-body-wrap">
        <div class="card-eye">${d.eye}</div>
        <div class="card-title">${d.title}</div>
        ${d.content()}
        <button class="card-btn" onclick="advance()">${d.btnLabel}</button>
      </div>
    `;
    card.addEventListener('mousedown',  e => startDrag(e.clientX));
    card.addEventListener('touchstart', e => startDrag(e.touches[0].clientX), {passive:true});
    stack.appendChild(card);
  });
  updatePos();
}

function updatePos() {
  CARDS.forEach((_,i) => {
    const el = document.getElementById('card'+i);
    el.className = 'card ' + CARDS[i].theme;
    if      (i < current)     el.classList.add('prev');
    else if (i === current)   el.classList.add('active');
    else if (i === current+1) el.classList.add('behind1');
    else if (i === current+2) el.classList.add('behind2');
    else                      el.classList.add('hidden');
  });
  const pct = ((current+1)/CARDS.length)*100;
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progLabel').textContent = (current+1)+' / '+CARDS.length;
}

function advance() {
  current++;
  if (current >= CARDS.length) { showFinish(); return; }
  updatePos();
}

function showFinish() {
  document.getElementById('mainStage').style.display = 'none';
  document.getElementById('finishStage').classList.add('show');
  burst(90); setTimeout(() => burst(60), 800);
}

function restart() {
  current = 0;
  document.getElementById('finishStage').classList.remove('show');
  document.getElementById('mainStage').style.display = 'flex';
  buildCards();
}

function startDrag(x) {
  isDragging=true; startX=x; dragX=0;
  const el = document.getElementById('card'+current);
  if (el) el.classList.add('swiping');
  const onMove = cx => { if(!isDragging)return; dragX=cx-startX; const e=document.getElementById('card'+current); if(e) e.style.transform=`translateX(${dragX}px) rotate(${dragX*0.04}deg)`; };
  const onUp = () => { isDragging=false; const e=document.getElementById('card'+current); if(e){e.classList.remove('swiping');e.style.transform='';} if(Math.abs(dragX)>85)advance(); window.removeEventListener('mousemove',mm); window.removeEventListener('touchmove',tm); window.removeEventListener('mouseup',onUp); window.removeEventListener('touchend',onUp); };
  const mm=e=>onMove(e.clientX), tm=e=>onMove(e.touches[0].clientX);
  window.addEventListener('mousemove',mm); window.addEventListener('touchmove',tm,{passive:true});
  window.addEventListener('mouseup',onUp); window.addEventListener('touchend',onUp);
}

function burst(count) {
  const box = document.getElementById('confBox');
  for (let i=0;i<count;i++) {
    const c=document.createElement('div'); c.className='conf';
    const size=Math.random()*10+5;
    c.style.cssText=`left:${Math.random()*100}%;top:-20px;width:${size}px;height:${size}px;background:${CONF[Math.floor(Math.random()*CONF.length)]};border-radius:${Math.random()>0.45?'50%':'3px'};animation-duration:${Math.random()*1.6+1}s;animation-delay:${Math.random()*0.5}s;`;
    box.appendChild(c);
    c.addEventListener('animationend',()=>c.remove());
  }
}

buildCards();
</script>

    function googleTranslateElementInit() {
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang') || 'en';
        
        // Force cookie for Google Translate
        const domain = window.location.hostname;
        document.cookie = "googtrans=/en/" + lang + "; path=/; domain=" + domain;
        document.cookie = "googtrans=/en/" + lang + "; path=/";
        
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: true
        }, 'google_translate_element');
        
        // Periodically check and force the dropdown
        let attempts = 0;
        const interval = setInterval(() => {
            const select = document.querySelector('select.goog-te-combo');
            if (select) {
                if (select.value !== lang) {
                    select.value = lang;
                    select.dispatchEvent(new Event('change'));
                }
                attempts++;
                if (attempts > 10) clearInterval(interval);
            }
        }, 1000);
    }
  </script>
