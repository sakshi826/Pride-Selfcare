<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dealing With Homophobia</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;0,900;1,300;1,500;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; }
body { background:#f5f0ff; }

.bg {
  position:fixed; inset:0; z-index:0;
  background:linear-gradient(145deg,#f5f0ff 0%,#fce8f3 35%,#e8f4fd 70%,#edfdf5 100%);
}
.bg-blob { position:absolute;border-radius:50%;filter:blur(90px);will-change:transform;opacity:0.5; }
.bb1 { width:500px;height:500px;background:#e9d5ff;top:-150px;left:-120px;animation:bv1 22s ease-in-out infinite alternate; }
.bb2 { width:420px;height:420px;background:#fecdd3;bottom:-100px;right:-100px;animation:bv2 26s ease-in-out infinite alternate; }
.bb3 { width:340px;height:340px;background:#bae6fd;top:35%;right:-60px;animation:bv1 18s ease-in-out infinite alternate-reverse; }
.bb4 { width:270px;height:270px;background:#bbf7d0;bottom:12%;left:-50px;animation:bv2 20s ease-in-out infinite alternate; }
@keyframes bv1 { from{transform:translate(0,0)} to{transform:translate(28px,20px)} }
@keyframes bv2 { from{transform:translate(0,0)} to{transform:translate(-22px,-16px)} }

/* Stage */
.stage { position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem 1.2rem;gap:0.8rem; }

/* Progress */
.prog-wrap { width:100%;max-width:420px;display:flex;align-items:center;gap:10px; }
.prog-track { flex:1;height:4px;background:rgba(139,92,246,0.12);border-radius:100px;overflow:hidden; }
.prog-fill { height:100%;border-radius:100px;background:linear-gradient(90deg,#c084fc,#f9a8d4,#93c5fd);transition:width 0.6s cubic-bezier(0.22,1,0.36,1); }
.prog-label { font-size:0.73rem;font-weight:600;color:rgba(109,40,217,0.4);min-width:36px;text-align:right;letter-spacing:0.04em; }

/* Card stack */
.card-stack { width:100%;max-width:420px;position:relative;height:clamp(490px,72vh,580px); }

/* Card */
.card {
  position:absolute; inset:0;
  border-radius:26px;
  display:flex; flex-direction:column;
  overflow:hidden;
  box-shadow:0 12px 40px rgba(109,40,217,0.09),0 3px 12px rgba(0,0,0,0.05);
  border:1px solid rgba(255,255,255,0.92);
  transition:transform 0.5s cubic-bezier(0.22,1,0.36,1),opacity 0.4s ease;
  will-change:transform; user-select:none; cursor:grab;
}
.card.hidden  { opacity:0;transform:translateX(115%) rotate(8deg);pointer-events:none; }
.card.active  { opacity:1;transform:translateX(0) rotate(0);z-index:5; }
.card.prev    { opacity:0;transform:translateX(-115%) rotate(-8deg);pointer-events:none; }
.card.behind1 { opacity:0.55;transform:scale(0.93) translateY(14px);z-index:4;pointer-events:none; }
.card.behind1 .card-body { visibility:hidden; }
.card.behind2 { opacity:0.3;transform:scale(0.87) translateY(26px);z-index:3;pointer-events:none; }
.card.behind2 .card-body { visibility:hidden; }
.card.swiping { transition:none; }

/* Card top colour band */
.card-band { height:6px;width:100%;flex-shrink:0; }

/* Card body */
.card-body { padding:1.4rem 1.6rem 1rem;display:flex;flex-direction:column;flex:1;overflow:hidden;background:rgba(255,255,255,0.88); }

.card-eye { font-size:0.62rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.25rem; }
.card-title { font-family:'Fraunces',serif;font-weight:900;font-size:clamp(1.15rem,3.2vw,1.45rem);line-height:1.2;margin-bottom:0.9rem;color:#1e1040; }
.card-title em { font-style:italic;font-weight:700;opacity:0.62; }

/* ── BUBBLE REVEAL system ── */
/* Sentences appear as tap-to-reveal bubbles */
.bubble-area { display:flex;flex-direction:column;gap:0.45rem;flex:1;margin-bottom:0.5rem; }

.bubble-item {
  border-radius:18px;
  padding:0.7rem 1rem;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  border:1.5px solid;
  transition:transform 0.12s ease;
  flex-shrink:0;
}
.bubble-item:active { transform:scale(0.97); }

/* Scratch overlay — covers the text, removed on tap */
.scratch-layer {
  position:absolute; inset:0;
  border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  transition:opacity 0.35s ease, transform 0.35s ease;
  z-index:2;
}
.scratch-layer.revealed { opacity:0;transform:scale(1.04);pointer-events:none; }

.scratch-icon { font-size:1.2rem;margin-right:6px; }
.scratch-hint {
  font-size:0.7rem;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;opacity:0.7;
}

/* Bubble text — hidden until revealed */
.bubble-text {
  position:relative;z-index:1;
  font-family:'Fraunces',serif;font-style:italic;font-weight:600;
  font-size:0.95rem;line-height:1.5;
  opacity:0;
  transition:opacity 0.35s ease 0.15s;
}
.bubble-text.revealed { opacity:1; }

/* Sub text (for scenario-style) */
.bubble-sub {
  position:relative;z-index:1;
  font-family:'DM Sans',sans-serif;font-style:normal;font-weight:300;
  font-size:0.76rem;line-height:1.45;margin-top:3px;
  opacity:0;transition:opacity 0.35s ease 0.2s;color:#4b5563;
}
.bubble-sub.revealed { opacity:1; }

/* Pop animation on reveal */
@keyframes bubblePop {
  0%   { transform:scale(1); }
  35%  { transform:scale(1.05); }
  60%  { transform:scale(0.97); }
  100% { transform:scale(1); }
}
.bubble-item.popping { animation:bubblePop 0.4s ease; }

/* Reveal-all hint */
.reveal-hint {
  font-size:0.78rem;font-weight:700;color:#4c1d95;
  text-align:center;margin-bottom:0.5rem;letter-spacing:0.04em;
  animation:hintPulse 2s ease-in-out infinite;
  flex-shrink:0;
  background:rgba(237,233,254,0.7);
  border-radius:100px;
  padding:3px 12px;
  margin-bottom:0.35rem;
}
@keyframes hintPulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
.reveal-hint.hidden { visibility:hidden; }

/* Breath orb */
.breath-center { display:flex;align-items:center;justify-content:center;margin-bottom:0.4rem;flex-shrink:0; }
.breath-orb { position:relative;width:56px;height:56px;display:flex;align-items:center;justify-content:center; }
.bor { position:absolute;border-radius:50%;animation:breathP 4s ease-in-out infinite; }
.bor1{width:32px;height:32px}
.bor2{width:44px;height:44px;animation-delay:0.5s}
.bor3{width:56px;height:56px;animation-delay:1s}
.bor-core { width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;z-index:1;animation:breathP 4s ease-in-out infinite; }
@keyframes breathP { 0%,100%{transform:scale(1);opacity:0.7} 50%{transform:scale(1.12);opacity:1} }

/* Safety box */
.safety-box { border-radius:14px;padding:0.65rem 0.9rem;background:#fef2f2;border:1px solid #fecaca;border-left:3px solid #f87171;margin-bottom:0.45rem;flex-shrink:0; }
.safety-title { font-size:0.62rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:#dc2626;margin-bottom:0.25rem; }
.safety-text { font-size:0.78rem;font-weight:500;color:#7f1d1d;line-height:1.55; }

/* Counter label */
.reveal-counter {
  font-size:0.68rem;font-weight:600;letter-spacing:0.06em;
  text-align:right;margin-bottom:0.2rem;flex-shrink:0;
  opacity:0.5;
}

/* Button */
.card-btn {
  width:100%;min-height:46px;border-radius:100px;
  cursor:pointer;margin-top:auto;flex-shrink:0;
  font-family:'DM Sans',sans-serif;font-weight:700;
  font-size:0.82rem;letter-spacing:0.07em;text-transform:uppercase;
  color:white;border:none;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:opacity 0.15s;
}
.card-btn:hover { opacity:0.88; }
.card-btn:active { opacity:0.78; }

.swipe-hint { font-size:0.72rem;color:rgba(109,40,217,0.25);letter-spacing:0.04em; }

/* Finish */
#finishStage { display:none;position:fixed;inset:0;z-index:20;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(145deg,#f5f0ff,#fce8f3,#e8f4fd); }
#finishStage.show { display:flex; }
.finish-inner { background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.95);border-radius:32px;padding:2.4rem 2rem;max-width:400px;width:100%;display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:0 16px 50px rgba(109,40,217,0.1);animation:popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes popIn { from{opacity:0;transform:scale(0.84)} to{opacity:1;transform:scale(1)} }
.finish-emoji { font-size:3.8rem;margin-bottom:0.9rem; }
.finish-flag { display:flex;gap:3px;height:5px;width:90px;border-radius:100px;overflow:hidden;margin:0 auto 1.2rem; }
.finish-flag span { flex:1; }
.finish-title { font-family:'Fraunces',serif;font-size:clamp(1.7rem,5vw,2.4rem);font-weight:900;color:#1e1040;line-height:1.18;margin-bottom:0.7rem; }
.finish-title em { font-style:italic;color:#7c3aed; }
.finish-sub { font-size:0.9rem;font-weight:300;color:#4b5563;line-height:1.8;max-width:320px;margin-bottom:1.6rem; }
.finish-btn { background:linear-gradient(135deg,#c084fc,#f9a8d4);border:none;border-radius:100px;padding:0.85rem 2.2rem;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.88rem;letter-spacing:0.06em;color:white;cursor:pointer;transition:opacity 0.15s;box-shadow:0 4px 18px rgba(192,132,252,0.3); }
.finish-btn:hover { opacity:0.88; }

.conf-box { position:fixed;inset:0;z-index:99;pointer-events:none;overflow:hidden; }
.conf { position:absolute;animation:confFall linear forwards; }
@keyframes confFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(520deg);opacity:0} }
</style>

</head>

<body>

<div class="bg">
  <div class="bg-blob bb1"></div><div class="bg-blob bb2"></div>
  <div class="bg-blob bb3"></div><div class="bg-blob bb4"></div>
</div>
<div class="conf-box" id="confBox"></div>

<div class="stage" id="mainStage">
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:20%"></div></div>
    <span class="prog-label" id="progLabel">1 / 5</span>
  </div>
  <div class="card-stack" id="cardStack"></div>
  <div class="swipe-hint">Swipe or tap button to continue</div>
</div>

<div id="finishStage">
  <div class="finish-inner">
    <div class="finish-emoji">&#128170;</div>
    <div class="finish-flag">
      <span style="background:#ef4444"></span><span style="background:#f97316"></span>
      <span style="background:#facc15"></span><span style="background:#22c55e"></span>
      <span style="background:#3b82f6"></span><span style="background:#a855f7"></span>
    </div>
    <h1 class="finish-title">Their hatred says <em>nothing</em> about you.</h1>
    <p class="finish-sub">Homophobia is a reflection of fear and ignorance. You are not diminished by it. You are still whole, still worthy, still entirely yourself.</p>
    <button class="finish-btn" onclick="restart()">Start again &#8635;</button>
  </div>
</div>

<script>
// Each card defines: band gradient, eye label/colour, title, button gradient,
// and an array of bubble items to tap and reveal
const CARDS = [
  // Card 1: Welcome + Types of homophobia
  {
    band:'linear-gradient(90deg,#c084fc,#a78bfa,#818cf8)',
    eye:'&#128166; You Are Not Alone', eyeColor:'#7c3aed',
    title:'Dealing With Homophobia',
    btn:'linear-gradient(135deg,#c084fc,#818cf8)',
    btnLabel:'Begin &#10022;',
    breathOrb:null, safety:null,
    bubbles:[
      { bg:'#f5f3ff', border:'#c4b5fd', scratchBg:'#ede9fe', scratchColor:'#6d28d9', icon:'&#128161;',
        text:'Homophobia is painful, unfair, and never your fault.' },
      { bg:'#fdf4ff', border:'#ddd6fe', scratchBg:'#f3e8ff', scratchColor:'#7c3aed', icon:'&#128148;',
        text:'Direct rejection: insults, slurs, or being excluded because of who you are.' },
      { bg:'#f5f3ff', border:'#c4b5fd', scratchBg:'#ede9fe', scratchColor:'#6d28d9', icon:'&#128543;',
        text:'Microaggressions: subtle comments, assumptions, or jokes that chip away slowly.' },
      { bg:'#fdf4ff', border:'#ddd6fe', scratchBg:'#f3e8ff', scratchColor:'#7c3aed', icon:'&#128064;',
        text:'Internalised homophobia: when the world\'s messages become your own inner critic.' },
    ]
  },
  // Card 2: Breathe + Your choice of response
  {
    band:'linear-gradient(90deg,#7dd3fc,#38bdf8,#0ea5e9)',
    eye:'&#128168; Ground Yourself', eyeColor:'#0369a1',
    title:'Breathe First, Then Choose',
    btn:'linear-gradient(135deg,#7dd3fc,#38bdf8)',
    btnLabel:'Next &#8594;',
    breathOrb:{ ring:'rgba(14,165,233,0.18)', core:'#e0f2fe', coreB:'rgba(14,165,233,0.25)', emoji:'&#128170;' },
    safety:null,
    bubbles:[
      { bg:'#eff6ff', border:'#7dd3fc', scratchBg:'#dbeafe', scratchColor:'#0369a1', icon:'&#128168;',
        text:'Breathe in slowly for 4 counts. This is about their fear, not your worth.' },
      { bg:'#f0f9ff', border:'#38bdf8', scratchBg:'#e0f2fe', scratchColor:'#0369a1', icon:'&#128330;',
        text:'Walk away in silence', sub:'Your peace is more valuable than winning an argument.' },
      { bg:'#eff6ff', border:'#7dd3fc', scratchBg:'#dbeafe', scratchColor:'#0369a1', icon:'&#128483;',
        text:'Calmly name the behaviour', sub:'That comment was homophobic. I will not engage with it.' },
      { bg:'#f0f9ff', border:'#38bdf8', scratchBg:'#e0f2fe', scratchColor:'#0369a1', icon:'&#129309;',
        text:'Reach out to someone safe', sub:'You do not have to process this alone.' },
    ]
  },
  // Card 3: Internalised homophobia + Counter the critic
  {
    band:'linear-gradient(90deg,#fda4af,#fb7185,#f43f5e)',
    eye:'&#128149; The Inner Critic', eyeColor:'#be185d',
    title:'Name It and Replace It',
    btn:'linear-gradient(135deg,#fda4af,#fb7185)',
    btnLabel:'Next &#8594;',
    breathOrb:null, safety:null,
    bubbles:[
      { bg:'#fff1f2', border:'#fda4af', scratchBg:'#fce7f3', scratchColor:'#be185d', icon:'&#128543;',
        text:'Shame about attraction', sub:'Feeling wrong or broken for who you love.' },
      { bg:'#fce7f3', border:'#f9a8d4', scratchBg:'#fdf2f8', scratchColor:'#9d174d', icon:'&#128064;',
        text:'Hiding or minimising yourself', sub:'Making yourself smaller to feel safer.' },
      { bg:'#fff1f2', border:'#fda4af', scratchBg:'#fce7f3', scratchColor:'#be185d', icon:'&#10006;',
        text:'Name it: that is not mine, that is borrowed fear.' },
      { bg:'#fce7f3', border:'#f9a8d4', scratchBg:'#fdf2f8', scratchColor:'#9d174d', icon:'&#10024;',
        text:'Replace it: I am gay and that is completely valid.' },
    ]
  },
  // Card 4: Community + Protect your peace
  {
    band:'linear-gradient(90deg,#a5b4fc,#818cf8,#6366f1)',
    eye:'&#127760; Strength and Limits', eyeColor:'#4338ca',
    title:'Community and Self-Protection',
    btn:'linear-gradient(135deg,#a5b4fc,#818cf8)',
    btnLabel:'Next &#8594;',
    breathOrb:null, safety:null,
    bubbles:[
      { bg:'#eef2ff', border:'#a5b4fc', scratchBg:'#e0e7ff', scratchColor:'#4338ca', icon:'&#128170;',
        text:'Millions of gay men survived and still lived beautifully. You belong to that lineage.' },
      { bg:'#e0e7ff', border:'#818cf8', scratchBg:'#eef2ff', scratchColor:'#3730a3', icon:'&#10003;',
        text:'Limit contact with people who are consistently harmful.' },
      { bg:'#eef2ff', border:'#a5b4fc', scratchBg:'#e0e7ff', scratchColor:'#4338ca', icon:'&#10003;',
        text:'Chosen family and community are real support.' },
      { bg:'#e0e7ff', border:'#818cf8', scratchBg:'#eef2ff', scratchColor:'#3730a3', icon:'&#10003;',
        text:'Seeking therapy is a sign of self-respect, not weakness.' },
    ]
  },
  // Card 5: Safety + Final affirmations
  {
    band:'linear-gradient(90deg,#c084fc,#f9a8d4,#a78bfa)',
    eye:'&#128149; Remember This', eyeColor:'#7c3aed',
    title:'Their Hatred Says <em>Nothing</em> About You',
    btn:'linear-gradient(135deg,#c084fc,#f9a8d4)',
    btnLabel:'Finish &#127752;',
    breathOrb:null,
    safety:'If you are ever unsafe, remove yourself first. <a href="https://web.mantracare.com/plans/lgbtq-therapy" target="_blank" style="color:#dc2626;font-weight:700;text-decoration:underline;">Reach out to our LGBTQ+ therapists for support.</a>',
    bubbles:[
      { bg:'#f5f3ff', border:'#c4b5fd', scratchBg:'#ede9fe', scratchColor:'#6d28d9', icon:'&#128166;',
        text:'Surviving is enough. You do not have to be brave every time.' },
      { bg:'#fdf4ff', border:'#ddd6fe', scratchBg:'#f3e8ff', scratchColor:'#7c3aed', icon:'&#128170;',
        text:'I am not defined by anyone\'s hatred.' },
      { bg:'#f5f3ff', border:'#c4b5fd', scratchBg:'#ede9fe', scratchColor:'#6d28d9', icon:'&#10024;',
        text:'My worth is not up for debate.' },
      { bg:'#fdf4ff', border:'#ddd6fe', scratchBg:'#f3e8ff', scratchColor:'#7c3aed', icon:'&#127752;',
        text:'I carry my identity with pride.' },
    ]
  }
];

let current=0, isDragging=false, startX=0, dragX=0;
const CONF=['#e9d5ff','#fecdd3','#bae6fd','#bbf7d0','#fde68a','#c7d2fe','#99f6e4','#fda4af'];

function buildCards(){
  const stack=document.getElementById('cardStack');
  stack.innerHTML='';
  CARDS.forEach((d,i)=>{
    const card=document.createElement('div');
    card.className='card'; card.id='card'+i;

    // Build bubble HTML
    const bubbleHTML = d.bubbles.map((b,j) => `
      <div class="bubble-item" id="bubble_${i}_${j}"
        style="background:${b.bg};border-color:${b.border}"
        onclick="revealBubble(${i},${j})">
        <div class="scratch-layer" id="scratch_${i}_${j}"
          style="background:${b.scratchBg};color:${b.scratchColor}">
          <span class="scratch-icon">${b.icon}</span>
          <span class="scratch-hint">Tap to reveal</span>
        </div>
        <div class="bubble-text" id="btext_${i}_${j}" style="color:#1e1040">
          ${b.text}
        </div>
        ${b.sub ? `<div class="bubble-sub" id="bsub_${i}_${j}">${b.sub}</div>` : ''}
      </div>
    `).join('');

    const breathHTML = d.breathOrb ? `
      <div class="breath-center">
        <div class="breath-orb">
          <div class="bor bor3" style="border-color:${d.breathOrb.ring}"></div>
          <div class="bor bor2" style="border-color:${d.breathOrb.ring}"></div>
          <div class="bor bor1" style="border-color:${d.breathOrb.ring}"></div>
          <div class="bor-core" style="background:${d.breathOrb.core};border:1px solid ${d.breathOrb.coreB}">${d.breathOrb.emoji}</div>
        </div>
      </div>` : '';

    const safetyHTML = d.safety ? `
      <div class="safety-box">
        <div class="safety-title">&#9888; If You Are Unsafe</div>
        <div class="safety-text">${d.safety}</div>
      </div>` : '';

    card.innerHTML = `
      <div class="card-band" style="background:${d.band}"></div>
      <div class="card-body">
        <div class="card-eye" style="color:${d.eyeColor}">${d.eye}</div>
        <div class="card-title">${d.title}</div>
        ${breathHTML}
        ${safetyHTML}
        <div class="reveal-counter" id="counter_${i}" style="color:${d.eyeColor}">0 / ${d.bubbles.length} revealed</div>
        <p class="reveal-hint" id="hint_${i}">&#128070; Tap each bubble to reveal</p>
        <div class="bubble-area">${bubbleHTML}</div>
        <button class="card-btn" style="background:${d.btn}" onclick="advance()">${d.btnLabel}</button>
      </div>
    `;

    card.addEventListener('mousedown', e=>startDrag(e.clientX));
    card.addEventListener('touchstart', e=>startDrag(e.touches[0].clientX),{passive:true});
    stack.appendChild(card);
  });
  updatePos();
}

// Track revealed per card
const revealedMap = {};

function revealBubble(cardIdx, bubIdx){
  const key = `${cardIdx}_${bubIdx}`;
  if(revealedMap[key]) return;
  revealedMap[key] = true;

  const scratch = document.getElementById(`scratch_${cardIdx}_${bubIdx}`);
  const text = document.getElementById(`btext_${cardIdx}_${bubIdx}`);
  const sub = document.getElementById(`bsub_${cardIdx}_${bubIdx}`);
  const bubble = document.getElementById(`bubble_${cardIdx}_${bubIdx}`);

  scratch.classList.add('revealed');
  text.classList.add('revealed');
  if(sub) sub.classList.add('revealed');

  bubble.classList.add('popping');
  bubble.addEventListener('animationend', ()=>bubble.classList.remove('popping'), {once:true});

  // Mini confetti burst from bubble
  miniConfetti(bubble);

  // Update counter
  const d = CARDS[cardIdx];
  const total = d.bubbles.length;
  const revealedCount = d.bubbles.filter((_,j)=>revealedMap[`${cardIdx}_${j}`]).length;
  const counter = document.getElementById(`counter_${cardIdx}`);
  if(counter) counter.textContent = `${revealedCount} / ${total} revealed`;

  // Hide hint once first tap happens
  if(revealedCount === 1){
    const hint = document.getElementById(`hint_${cardIdx}`);
    if(hint) hint.classList.add('hidden');
  }
}

function miniConfetti(el){
  const rect = el.getBoundingClientRect();
  const box = document.getElementById('confBox');
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  for(let i=0;i<8;i++){
    const c = document.createElement('div');
    const size = Math.random()*6+3;
    const angle = (Math.random()*360) * Math.PI/180;
    const dist = Math.random()*40+20;
    c.style.cssText=`position:absolute;left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${CONF[Math.floor(Math.random()*CONF.length)]};border-radius:50%;pointer-events:none;z-index:99;animation:miniPop 0.5s ease forwards;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;`;
    box.appendChild(c);
    setTimeout(()=>c.remove(),550);
  }
}

// Mini pop style injection
const style = document.createElement('style');
style.textContent=`@keyframes miniPop{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0.2);opacity:0}}`;
document.head.appendChild(style);

function updatePos(){
  CARDS.forEach((_,i)=>{
    const el=document.getElementById('card'+i);
    el.className='card';
    if(i<current) el.classList.add('prev');
    else if(i===current) el.classList.add('active');
    else if(i===current+1) el.classList.add('behind1');
    else if(i===current+2) el.classList.add('behind2');
    else el.classList.add('hidden');
  });
  document.getElementById('progFill').style.width=((current+1)/CARDS.length*100)+'%';
  document.getElementById('progLabel').textContent=(current+1)+' / '+CARDS.length;
}

function advance(){ current++; if(current>=CARDS.length){showFinish();return;} updatePos(); }

function showFinish(){
  document.getElementById('mainStage').style.display='none';
  document.getElementById('finishStage').classList.add('show');
  burst(80); setTimeout(()=>burst(55),700);
}

function restart(){
  current=0;
  Object.keys(revealedMap).forEach(k=>delete revealedMap[k]);
  document.getElementById('finishStage').classList.remove('show');
  document.getElementById('mainStage').style.display='flex';
  buildCards();
}

function startDrag(x){
  isDragging=true;startX=x;dragX=0;
  const el=document.getElementById('card'+current);
  if(el)el.classList.add('swiping');
  const onMove=cx=>{if(!isDragging)return;dragX=cx-startX;const e=document.getElementById('card'+current);if(e)e.style.transform=`translateX(${dragX}px) rotate(${dragX*0.04}deg)`;};
  const onUp=()=>{isDragging=false;const e=document.getElementById('card'+current);if(e){e.classList.remove('swiping');e.style.transform='';}if(Math.abs(dragX)>85)advance();window.removeEventListener('mousemove',mm);window.removeEventListener('touchmove',tm);window.removeEventListener('mouseup',onUp);window.removeEventListener('touchend',onUp);};
  const mm=e=>onMove(e.clientX),tm=e=>onMove(e.touches[0].clientX);
  window.addEventListener('mousemove',mm);window.addEventListener('touchmove',tm,{passive:true});
  window.addEventListener('mouseup',onUp);window.addEventListener('touchend',onUp);
}

function burst(count){
  const box=document.getElementById('confBox');
  for(let i=0;i<count;i++){
    const c=document.createElement('div');c.className='conf';
    const size=Math.random()*9+5;
    c.style.cssText=`left:${Math.random()*100}%;top:-20px;width:${size}px;height:${size}px;background:${CONF[Math.floor(Math.random()*CONF.length)]};border-radius:${Math.random()>0.45?'50%':'3px'};animation-duration:${Math.random()*1.6+1}s;animation-delay:${Math.random()*0.5}s;`;
    box.appendChild(c);
    c.addEventListener('animationend',()=>c.remove());
  }
}

buildCards();
</script>
</body>
</html>
