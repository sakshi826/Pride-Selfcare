server {
    listen 80;
    absolute_redirect off;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Custom static routing for Claude Minis
    location /static/pride/ {
        root /usr/share/nginx/html;
        # For Claude static HTML files, we map /static/pride/ directly to the folder.
        # But wait, Vite build puts public/static/pride into /static/pride in dist.
        # So it's already inside /usr/share/nginx/html/static/pride.
        # The default try_files will try to find the index.html inside the directory.
        try_files $uri $uri/ $uri/index.html /index.html;
    }
}
