<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practicing Your Coming Out Moment</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; background:#f9f4fc; }

/* ── Static soft bg — NO filter animation, uses opacity only ── */
.bg-layer { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.blob {
  position:absolute; border-radius:50%;
  opacity:0.35;
  will-change:transform;
  /* blur baked in as a visual layer — not animated */
  filter:blur(90px);
}
/* Only transform animates — GPU-composited, zero lag */
.b1 { width:520px;height:520px;background:#f8bbd0;top:-160px;left:-140px; animation:mv1 20s ease-in-out infinite alternate; }
.b2 { width:420px;height:420px;background:#ddd6fe;bottom:-120px;right:-120px; animation:mv2 24s ease-in-out infinite alternate; }
.b3 { width:320px;height:320px;background:#bbf7d0;top:30%;right:-60px; animation:mv1 17s ease-in-out infinite alternate-reverse; }
.b4 { width:280px;height:280px;background:#fde68a;bottom:8%;left:-70px; animation:mv2 19s ease-in-out infinite alternate; }
@keyframes mv1 { from{transform:translate(0,0)} to{transform:translate(28px,20px)} }
@keyframes mv2 { from{transform:translate(0,0)} to{transform:translate(-22px,-16px)} }

/* ── Stage ── */
.stage {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:0.9rem 1rem; gap:0.75rem;
}

/* ── Progress dots ── */
.dot-row { display:flex; gap:7px; align-items:center; }
.dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(140,80,160,0.15);
  transition:width 0.4s cubic-bezier(0.22,1,0.36,1), background 0.4s ease;
}
.dot.active { width:26px; border-radius:4px; background:#b57db8; }
.dot.done   { background:rgba(140,80,160,0.35); }

/* ── Card wrap ── */
.card-wrap {
  width:100%; max-width:440px;
  position:relative;
  flex:1;
  min-height:0;
  max-height:calc(100vh - 280px);
  display:flex; align-items:stretch;
}

/* ── Card ── */
.card {
  width:100%; height:100%;
  background:#ffffff;
  border-radius:26px;
  overflow:hidden; overflow-y:auto;
  display:none;
  flex-direction:column;
  box-shadow:0 12px 40px rgba(120,60,140,0.09), 0 3px 12px rgba(0,0,0,0.04);
}
.card.active {
  display:flex;
  animation:cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
.card.leaving {
  display:flex;
  animation:cardOut 0.35s ease both;
  pointer-events:none;
  position:absolute; top:0; left:0;
}
/* Only opacity + transform — compositor thread only */
@keyframes cardIn  { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
@keyframes cardOut { from{opacity:1;transform:translateY(0)}  to{opacity:0;transform:translateY(-16px)} }

/* Card top band */
.card-band { height:8px; width:100%; flex-shrink:0; }

/* Card inner padding */
.card-inner { padding:2rem 2.2rem 2.2rem; display:flex; flex-direction:column; flex:1; min-height:0; }

/* Eyebrow */
.card-eyebrow {
  font-size:0.68rem; font-weight:700; letter-spacing:0.14em;
  text-transform:uppercase; margin-bottom:0.4rem;
  display:flex; align-items:center; gap:5px;
}

/* Title */
.card-title {
  font-family:'Playfair Display',serif; font-weight:700;
  font-size:clamp(1.35rem,3.9vw,1.7rem); line-height:1.24;
  color:#2c0f38; margin-bottom:1.1rem;
}

/* Body */
.card-body {
  font-size:0.95rem; font-weight:300; line-height:1.9;
  color:#5a4060; margin-bottom:1.3rem;
}

/* ── Bubbles ── */
.convo-area { display:flex; flex-direction:column; gap:0.85rem; margin-bottom:1.3rem; }
.bubble-row { display:flex; align-items:flex-end; gap:7px; }
.bubble-row.right { flex-direction:row-reverse; }

.avatar {
  width:32px; height:32px; border-radius:50%;
  flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.95rem;
}

.bubble {
  max-width:80%; padding:0.8rem 1.1rem;
  border-radius:18px; font-size:0.9rem; line-height:1.65; font-weight:400;
  animation:bubbleFade 0.4s ease both;
}
.bubble-row.left  .bubble { border-bottom-left-radius:4px; }
.bubble-row.right .bubble { border-bottom-right-radius:4px; }

/* stagger delays on bubbles */
.bubble-row:nth-child(1) .bubble { animation-delay:0.05s; }
.bubble-row:nth-child(2) .bubble { animation-delay:0.18s; }
.bubble-row:nth-child(3) .bubble { animation-delay:0.31s; }

@keyframes bubbleFade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── Action list ── */
.action-list { display:flex; flex-direction:column; gap:0.65rem; margin-bottom:1.3rem; }
.action-item {
  display:flex; align-items:center; gap:10px;
  border-radius:14px; padding:0.85rem 1.15rem;
  font-size:0.91rem; font-weight:400;
  animation:itemSlide 0.4s ease both;
}
.action-item:nth-child(1){ animation-delay:0.06s; }
.action-item:nth-child(2){ animation-delay:0.16s; }
.action-item:nth-child(3){ animation-delay:0.26s; }
.action-item:nth-child(4){ animation-delay:0.36s; }
@keyframes itemSlide { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
.action-ic { font-size:1.05rem; flex-shrink:0; }

/* ── Notice box ── */
.notice-box {
  border-radius:16px; padding:1.1rem 1.3rem;
  font-size:0.9rem; font-style:italic; font-weight:300;
  line-height:1.7; margin-bottom:1.3rem;
  border:1px solid;
}

/* ── Conf points ── */
.conf-points { display:flex; flex-direction:column; gap:0.7rem; margin-bottom:1.3rem; }
.conf-point {
  display:flex; align-items:flex-start; gap:10px;
  font-size:0.91rem; font-weight:300; line-height:1.75;
  animation:itemSlide 0.4s ease both;
}
.conf-point:nth-child(1){ animation-delay:0.08s; }
.conf-point:nth-child(2){ animation-delay:0.2s; }
.conf-point:nth-child(3){ animation-delay:0.32s; }
.conf-ic { font-size:1rem; flex-shrink:0; margin-top:2px; }

/* ── Affirmation ── */
.affirm-box {
  border-radius:18px; border:2px solid;
  padding:1.2rem 1.3rem;
  font-family:'Playfair Display',serif; font-style:italic; font-weight:700;
  font-size:1.08rem; line-height:1.55; text-align:center;
  margin-bottom:1.3rem;
}

/* ── Button ── */
.card-btn {
  width:100%; min-height:54px; border-radius:100px;
  border:none; cursor:pointer; margin-top:auto;
  font-family:'DM Sans',sans-serif; font-weight:600;
  font-size:0.92rem; letter-spacing:0.05em; color:white;
  display:flex; align-items:center; justify-content:center; gap:7px;
  transition:transform 0.15s ease, box-shadow 0.15s ease;
}
.card-btn:hover { transform:translateY(-2px); }
.card-btn:active { transform:scale(0.97); }

/* ── Finish ── */
#finishStage {
  display:none; position:fixed; inset:0; z-index:20;
  align-items:center; justify-content:center; padding:2rem;
  background:#f0e8fc;
}
#finishStage.show { display:flex; }

.finish-glow {
  position:absolute; inset:0; pointer-events:none;
}
.finish-glow .fg1 { position:absolute;width:400px;height:400px;border-radius:50%;background:#e9d5ff;top:-100px;left:-100px;opacity:0.6; }
.finish-glow .fg2 { position:absolute;width:360px;height:360px;border-radius:50%;background:#fbcfe8;bottom:-80px;right:-80px;opacity:0.6; }
.finish-glow .fg3 { position:absolute;width:280px;height:280px;border-radius:50%;background:#bbf7d0;top:30%;right:-50px;opacity:0.4; }

.finish-inner {
  position:relative; z-index:1;
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1.5px solid rgba(255,255,255,0.9);
  border-radius:30px; padding:2.4rem 2rem;
  max-width:380px; width:100%;
  display:flex; flex-direction:column; align-items:center; text-align:center;
  box-shadow:0 20px 60px rgba(120,60,160,0.12);
  animation:cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
}

.finish-emoji { font-size:3.2rem; margin-bottom:0.9rem; }
.finish-dots { display:flex; gap:6px; margin-bottom:1.2rem; }
.finish-dots span { width:8px;height:8px;border-radius:50%; }

.finish-title {
  font-family:'Playfair Display',serif; font-size:clamp(1.7rem,5vw,2.4rem);
  font-weight:900; color:#2c0f38; line-height:1.2; margin-bottom:0.7rem;
}
.finish-title em { font-style:italic; color:#9333ea; }

.finish-sub {
  font-size:0.92rem; font-weight:300; color:#5a4060;
  line-height:1.8; max-width:320px; margin-bottom:1.6rem;
}

.finish-btn {
  background:#9333ea; color:white;
  border:none; border-radius:100px;
  padding:0.85rem 2.2rem;
  font-family:'DM Sans',sans-serif; font-weight:600; font-size:0.88rem;
  letter-spacing:0.06em; cursor:pointer;
  box-shadow:0 4px 20px rgba(147,51,234,0.3);
  transition:transform 0.15s, opacity 0.15s;
}
.finish-btn:hover { transform:translateY(-1px); opacity:0.9; }

/* Confetti */
.conf-container { position:fixed;inset:0;z-index:99;pointer-events:none;overflow:hidden; }
.conf { position:absolute; animation:confFall linear forwards; }
@keyframes confFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(520deg);opacity:0} }
</style>
</head>
<body>

<div class="bg-layer">
  <div class="blob b1"></div><div class="blob b2"></div>
  <div class="blob b3"></div><div class="blob b4"></div>
</div>
<div class="conf-container" id="confBox"></div>

<div class="stage" id="mainStage">
  <div class="dot-row" id="dotRow"></div>
  <div class="card-wrap" id="cardWrap"></div>
</div>

<div id="finishStage">
  <div class="finish-glow">
    <div class="fg1"></div><div class="fg2"></div><div class="fg3"></div>
  </div>
  <div class="finish-inner">
    <div class="finish-emoji">&#127752;</div>
    <div class="finish-dots">
      <span style="background:#f9a8d4"></span>
      <span style="background:#c4b5fd"></span>
      <span style="background:#86efac"></span>
      <span style="background:#fde68a"></span>
      <span style="background:#93c5fd"></span>
    </div>
    <h1 class="finish-title">You are <em>brave</em><br>and ready.</h1>
    <p class="finish-sub">Coming out is yours to own. There is no perfect moment, no perfect script. But every time you practice, you grow a little closer to the version of yourself that feels free.</p>
    <button class="finish-btn" onclick="restart()">Start again &#8635;</button>
  </div>
</div>

<script>

//            action bg, action text, notice bg, notice border, notice text, affirm border, affirm text,
//            btn bg, btn shadow, conf-point text

  { band:'#f9a8d4', eye:'#be185d', bOBg:'#fce7f3', bOTx:'#831843', bYBg:'#fbcfe8', bYTx:'#831843', actBg:'#fdf2f8', actTx:'#831843', notBg:'#fdf2f8', notBd:'#f9a8d4', notTx:'#9d174d', affBd:'#f9a8d4', affTx:'#be185d', btn:'#e879a0', btnSh:'rgba(232,121,160,0.3)', ptTx:'#4a1030' },
  { band:'#c4b5fd', eye:'#6d28d9', bOBg:'#ede9fe', bOTx:'#4c1d95', bYBg:'#ddd6fe', bYTx:'#4c1d95', actBg:'#f5f3ff', actTx:'#4c1d95', notBg:'#f5f3ff', notBd:'#c4b5fd', notTx:'#5b21b6', affBd:'#c4b5fd', affTx:'#6d28d9', btn:'#8b5cf6', btnSh:'rgba(139,92,246,0.3)', ptTx:'#2e1065' },
  { band:'#86efac', eye:'#15803d', bOBg:'#dcfce7', bOTx:'#14532d', bYBg:'#bbf7d0', bYTx:'#14532d', actBg:'#f0fdf4', actTx:'#14532d', notBg:'#f0fdf4', notBd:'#86efac', notTx:'#166534', affBd:'#86efac', affTx:'#15803d', btn:'#4ade80', btnSh:'rgba(74,222,128,0.3)', ptTx:'#14532d' },
  { band:'#93c5fd', eye:'#1d4ed8', bOBg:'#dbeafe', bOTx:'#1e3a8a', bYBg:'#bfdbfe', bYTx:'#1e3a8a', actBg:'#eff6ff', actTx:'#1e3a8a', notBg:'#eff6ff', notBd:'#93c5fd', notTx:'#1d4ed8', affBd:'#93c5fd', affTx:'#1d4ed8', btn:'#60a5fa', btnSh:'rgba(96,165,250,0.3)', ptTx:'#1e3a8a' },
  { band:'#fde68a', eye:'#b45309', bOBg:'#fef9c3', bOTx:'#713f12', bYBg:'#fef08a', bYTx:'#713f12', actBg:'#fefce8', actTx:'#713f12', notBg:'#fefce8', notBd:'#fde68a', notTx:'#a16207', affBd:'#fde68a', affTx:'#b45309', btn:'#facc15', btnSh:'rgba(250,204,21,0.3)', ptTx:'#713f12' },

          <div class="bubble" style="background:${t.bYBg};color:${t.bYTx}">I am a lesbian.</div>
        </div>
        <div class="bubble-row right">
          <div class="avatar" style="background:${t.bYBg}">&#128100;</div>
          <div class="bubble" style="background:${t.bYBg};color:${t.bYTx}">I like women.</div>
        </div>
        <div class="bubble-row right">
          <div class="avatar" style="background:${t.bYBg}">&#128100;</div>
          <div class="bubble" style="background:${t.bYBg};color:${t.bYTx}">I am a lesbian and I wanted you to know.</div>
        </div>
      </div>
      <div class="notice-box" style="background:${t.notBg};border-color:${t.notBd};color:${t.notTx}">Which one felt most like you? Practice that one.</div>
    `}
  },
  {
    eyebrow:'&#128149; Your Courage',
    title:'Your Courage Deserves Celebrating',
    btn:'Finish &#127881;',
    content(t){ return `
      <div class="conf-points">
        <div class="conf-point" style="color:${t.ptTx}"><span class="conf-ic">&#127752;</span>Coming out is your choice and your timing, always</div>
        <div class="conf-point" style="color:${t.ptTx}"><span class="conf-ic">&#128149;</span>You deserve to express who you are when you feel ready</div>
        <div class="conf-point" style="color:${t.ptTx}"><span class="conf-ic">&#10024;</span>Every time you practice, you build a little more ease</div>
      </div>
      <div class="affirm-box" style="border-color:${t.affBd};color:${t.affTx};background:${t.actBg}">I am proud of my courage.</div>
      <div class="action-list" style="margin-top:0.2rem">
        <div class="action-item" style="background:${t.actBg};color:${t.actTx}"><span class="action-ic">&#128168;</span>Take one deep breath and appreciate how far you have come</div>
      </div>
    `}
  }
];

let current = 0;

function buildDots() {
  const row = document.getElementById('dotRow');
  row.innerHTML = '';
  CARDS.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i===current ? ' active' : i<current ? ' done' : '');
    d.id = 'dot'+i;
    row.appendChild(d);
  });
}

function updateDots() {
  CARDS.forEach((_,i) => {
    const d = document.getElementById('dot'+i);
    d.className = 'dot' + (i===current ? ' active' : i<current ? ' done' : '');
  });
}

function renderCard(idx) {
  const d = CARDS[idx];
  const t = THEMES[idx];
  const wrap = document.getElementById('cardWrap');

  // Remove old leaving cards
  wrap.querySelectorAll('.card.leaving').forEach(el => el.remove());

  // Animate out current
  const old = wrap.querySelector('.card.active');
  if (old) {
    old.classList.remove('active');
    old.classList.add('leaving');
    setTimeout(() => { if(old.parentNode) old.remove(); }, 360);
  }

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-band" style="background:${t.band}"></div>
    <div class="card-inner">
      <div class="card-eyebrow" style="color:${t.eye}">${d.eyebrow}</div>
      <div class="card-title">${d.title}</div>
      ${d.content(t)}
      <button class="card-btn" style="background:${t.btn};box-shadow:0 5px 22px ${t.btnSh}" onclick="advance()">${d.btn}</button>
    </div>
  `;

  setTimeout(() => {
    wrap.appendChild(card);
    card.classList.add('active');
  }, old ? 180 : 0);
}

function advance() {
  current++;
  if (current >= CARDS.length) { showFinish(); return; }
  updateDots();
  renderCard(current);
}

function showFinish() {
  document.getElementById('mainStage').style.display = 'none';
  document.getElementById('finishStage').classList.add('show');
  burst(80); setTimeout(() => burst(55), 800);
}

function restart() {
  current = 0;
  document.getElementById('finishStage').classList.remove('show');
  document.getElementById('mainStage').style.display = 'flex';
  document.getElementById('cardWrap').innerHTML = '';
  buildDots();
  renderCard(0);
}

function burst(count) {
  const box = document.getElementById('confBox');
  const cols = ['#f9a8d4','#c4b5fd','#86efac','#fde68a','#93c5fd','#fed7aa','#a5f3fc'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    const size = Math.random() * 10 + 5;
    c.style.cssText = `left:${Math.random()*100}%;top:-20px;width:${size}px;height:${size}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>0.45?'50%':'3px'};animation-duration:${Math.random()*1.6+1}s;animation-delay:${Math.random()*0.5}s;`;
    box.appendChild(c);
    c.addEventListener('animationend', () => c.remove());
  }
}

buildDots();
renderCard(0);
</script>
</body>
</html>
