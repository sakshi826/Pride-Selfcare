<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confidence Mirror</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; }

/* ── Animated gradient background ── */
body {
  background: linear-gradient(135deg, #fff0f8, #f0f4ff, #fff8e1, #e8f5e9);
  background-size: 400% 400%;
  animation: bgShift 12s ease infinite;
}
@keyframes bgShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ── Stage ── */
.stage {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:1.2rem;
  gap:1rem;
}

/* ── Progress ── */
.progress-wrap {
  width:100%; max-width:400px;
  display:flex; align-items:center; gap:10px;
}
.progress-track {
  flex:1; height:5px;
  background:rgba(0,0,0,0.08);
  border-radius:100px; overflow:hidden;
}
.progress-fill {
  height:100%;
  border-radius:100px;
  transition:width 0.6s cubic-bezier(0.22,1,0.36,1);
}
.progress-label {
  font-size:0.75rem; font-weight:600;
  min-width:36px; text-align:right;
  letter-spacing:0.04em;
}

/* ── Card stack ── */
.card-stack {
  width:100%; max-width:400px;
  position:relative;
  height:clamp(520px, 70vh, 610px);
}

.card {
  position:absolute; inset:0;
  border-radius:32px;
  padding:1.6rem 1.8rem 1.5rem;
  display:flex; flex-direction:column;
  align-items:center;
  box-shadow: 0 24px 60px rgba(0,0,0,0.12), 0 6px 20px rgba(0,0,0,0.07);
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
  will-change:transform;
  overflow:hidden;
  user-select:none;
  cursor:grab;
}
.card.hidden  { opacity:0; transform:translateX(115%) rotate(8deg); pointer-events:none; }
.card.active  { opacity:1; transform:translateX(0) rotate(0);       z-index:5; }
.card.prev    { opacity:0; transform:translateX(-115%) rotate(-8deg); pointer-events:none; }
.card.behind1 { opacity:0.55; transform:scale(0.93) translateY(16px); z-index:4; pointer-events:none; }
.card.behind2 { opacity:0.3;  transform:scale(0.87) translateY(30px); z-index:3; pointer-events:none; }
.card.swiping { transition:none; }

/* Card colour themes */
.g1 { background:linear-gradient(150deg,#ff9a9e,#fad0c4,#ffecd2); color:#3d1530; }
.g2 { background:linear-gradient(150deg,#a18cd1,#fbc2eb); color:#2d1440; }
.g3 { background:linear-gradient(150deg,#fccb90,#d57eeb); color:#2d1440; }
.g4 { background:linear-gradient(150deg,#84fab0,#8fd3f4); color:#0d3030; }
.g5 { background:linear-gradient(150deg,#f093fb,#f5576c); color:#fff; }
.g6 { background:linear-gradient(150deg,#4facfe,#00f2fe); color:#fff; }
.g7 { background:linear-gradient(150deg,#43e97b,#38f9d7); color:#0d2d20; }
.g8 { background:linear-gradient(150deg,#fa709a,#fee140); color:#3d1020; }

/* Progress fill colours per card */
.g1 .progress-fill, .pf1 { background:linear-gradient(90deg,#ff9a9e,#fad0c4); }
.g2 .progress-fill, .pf2 { background:linear-gradient(90deg,#a18cd1,#fbc2eb); }

/* Deco circles */
.card-deco { position:absolute; border-radius:50%; opacity:0.15; pointer-events:none; }
.deco-a { width:240px;height:240px;top:-80px;right:-80px;background:white; }
.deco-b { width:160px;height:160px;bottom:-50px;left:-50px;background:white; }
.deco-c { width:90px;height:90px;top:40%;left:-25px;background:white; }

/* ── Illustration area ── */
.illus-wrap {
  width:100%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:0.6rem;
  height:120px;
  position:relative;
  z-index:1;
}
.illus-wrap svg { width:auto; height:100%; }

/* ── Card text ── */
.card-eyebrow {
  font-size:0.68rem; font-weight:700;
  letter-spacing:0.14em; text-transform:uppercase;
  opacity:0.6; margin-bottom:0.35rem;
  text-align:center;
  z-index:1; position:relative;
}
.card-title {
  font-family:'Playfair Display', serif;
  font-weight:700;
  font-size:clamp(1.3rem,4vw,1.7rem);
  line-height:1.2;
  text-align:center;
  margin-bottom:0.7rem;
  z-index:1; position:relative;
}
.card-body {
  font-size:0.9rem;
  font-weight:300;
  line-height:1.75;
  text-align:center;
  opacity:0.85;
  flex:1;
  z-index:1; position:relative;
  width:100%;
}

/* Steps list inside card */
.steps-list {
  list-style:none;
  width:100%;
  display:flex;
  flex-direction:column;
  gap:0.5rem;
  margin-top:0.5rem;
}
.steps-list li {
  background:rgba(255,255,255,0.28);
  border-radius:14px;
  padding:0.7rem 1rem;
  font-size:0.9rem;
  font-weight:400;
  display:flex; align-items:center; gap:10px;
  border:1px solid rgba(255,255,255,0.35);
  text-align:left;
}
.step-num {
  width:26px; height:26px;
  border-radius:50%;
  background:rgba(255,255,255,0.4);
  display:flex; align-items:center; justify-content:center;
  font-size:0.75rem; font-weight:700;
  flex-shrink:0;
}

/* Affirmation box */
.affirmation-box {
  background:rgba(255,255,255,0.3);
  border:2px solid rgba(255,255,255,0.5);
  border-radius:18px;
  padding:1rem 1.2rem;
  margin:0.6rem 0;
  font-family:'Playfair Display', serif;
  font-style:italic;
  font-size:1.1rem;
  font-weight:700;
  line-height:1.5;
  text-align:center;
  width:100%;
  z-index:1; position:relative;
  flex-shrink:0;
}

/* ── Button ── */
.card-btn {
  width:100%;
  min-height:52px;
  border-radius:100px;
  background:rgba(255,255,255,0.3);
  border:2px solid rgba(255,255,255,0.6);
  color:inherit;
  font-family:'DM Sans', sans-serif;
  font-weight:600;
  font-size:0.9rem;
  letter-spacing:0.05em;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:background 0.15s, transform 0.12s;
  flex-shrink:0;
  margin-top:auto;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:1; position:relative;
}
.card-btn:hover { background:rgba(255,255,255,0.48); transform:translateY(-2px); }
.card-btn:active { transform:scale(0.97); }

/* Swipe hint */
.swipe-hint {
  font-size:0.75rem;
  color:rgba(80,40,80,0.45);
  letter-spacing:0.03em;
}

/* ── Finish screen ── */
#finishStage {
  display:none; position:fixed; inset:0; z-index:20;
  align-items:center; justify-content:center; padding:2rem;
  background:linear-gradient(135deg,#ffecd2,#fcb69f,#ff9a9e,#fad0c4);
  background-size:300% 300%;
  animation:bgShift 8s ease infinite;
}
#finishStage.show { display:flex; }

.finish-inner {
  display:flex; flex-direction:column;
  align-items:center; text-align:center;
  max-width:380px; width:100%;
  animation:popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }

.finish-mirror-wrap {
  position:relative;
  width:130px; height:130px;
  margin-bottom:1.2rem;
}

.finish-title {
  font-family:'Playfair Display', serif;
  font-size:clamp(1.8rem,5vw,2.6rem);
  font-weight:900;
  color:#3d1020;
  line-height:1.18;
  margin-bottom:0.8rem;
}
.finish-title em { font-style:italic; color:#c2185b; }

.finish-sub {
  font-size:0.97rem;
  font-weight:300;
  color:#6d3040;
  line-height:1.8;
  max-width:340px;
  margin-bottom:1.8rem;
}

.finish-btn {
  background:rgba(255,255,255,0.4);
  border:2px solid rgba(255,255,255,0.7);
  border-radius:100px;
  padding:0.9rem 2.4rem;
  font-family:'DM Sans', sans-serif;
  font-weight:600;
  font-size:0.9rem;
  letter-spacing:0.06em;
  color:#3d1020;
  cursor:pointer;
  transition:background 0.15s, transform 0.12s;
}
.finish-btn:hover { background:rgba(255,255,255,0.6); transform:translateY(-1px); }

/* Confetti */
.conf-container { position:fixed;inset:0;z-index:99;pointer-events:none;overflow:hidden; }
.conf { position:absolute; animation:confFall linear forwards; }
@keyframes confFall {
  0%   { transform:translateY(-20px) rotate(0deg) scale(1); opacity:1; }
  100% { transform:translateY(110vh) rotate(540deg) scale(0.4); opacity:0; }
}

/* ── Pulse ring (breath animation) ── */
.pulse-ring {
  width:72px; height:72px;
  border-radius:50%;
  position:relative;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 0.4rem;
}
.pulse-ring::before, .pulse-ring::after {
  content:'';
  position:absolute; inset:0;
  border-radius:50%;
  border:2.5px solid rgba(255,255,255,0.5);
  animation:pulseExpand 2.5s ease-out infinite;
}
.pulse-ring::after { animation-delay:1.2s; }
.pulse-center {
  width:50px; height:50px; border-radius:50%;
  background:rgba(255,255,255,0.3);
  display:flex; align-items:center; justify-content:center;
  font-size:1.5rem;
  z-index:1;
  animation:breatheSoft 2.5s ease-in-out infinite;
}
@keyframes pulseExpand {
  0%   { transform:scale(1);   opacity:0.8; }
  100% { transform:scale(2.2); opacity:0; }
}
@keyframes breatheSoft {
  0%,100% { transform:scale(1); }
  50%     { transform:scale(1.12); }
}
</style>
</head>
<body>

<div class="conf-container" id="confBox"></div>

<!-- Main stage -->
<div class="stage" id="mainStage">
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progFill" style="width:12.5%"></div>
    </div>
    <span class="progress-label" id="progLabel" style="color:#9c6070">1 / 8</span>
  </div>
  <div class="card-stack" id="cardStack"></div>
  <div class="swipe-hint">Swipe or tap button to continue</div>
</div>

<!-- Finish stage -->

  <div class="finish-inner">
    <div class="finish-mirror-wrap">

        <defs>
          <radialGradient id="mirrorGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#fce4ec" stop-opacity="0.4"/>

        </defs>
        <ellipse cx="65" cy="55" rx="38" ry="46" fill="url(#mirrorGlow)" stroke="#f48fb1" stroke-width="3"/>
        <rect x="57" y="98" width="16" height="20" rx="4" fill="#f48fb1"/>
        <ellipse cx="65" cy="110" rx="20" ry="5" fill="#f48fb1" opacity="0.4"/>
        <!-- sparkles -->
        <g style="animation:spin 3s linear infinite;transform-origin:65px 55px">
          <circle cx="65" cy="12" r="3" fill="#ff80ab" opacity="0.7"/>
          <circle cx="100" cy="30" r="2" fill="#ce93d8" opacity="0.7"/>
          <circle cx="108" cy="68" r="2.5" fill="#ffcc02" opacity="0.7"/>
          <circle cx="65" cy="98" r="2" fill="#80deea" opacity="0.7"/>
          <circle cx="25" cy="75" r="2" fill="#a5d6a7" opacity="0.7"/>
          <circle cx="22" cy="35" r="2.5" fill="#ff9a9e" opacity="0.7"/>

        <!-- face -->
        <circle cx="57" cy="50" r="4" fill="#f06292" opacity="0.6"/>
        <circle cx="73" cy="50" r="4" fill="#f06292" opacity="0.6"/>
        <path d="M58 63 Q65 70 72 63" stroke="#e91e8c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 class="finish-title">You are <em>radiant.</em><br>You always were.</h1>
    <p class="finish-sub">Confidence grows with small moments like this. Every breath, every posture check, every kind word you say to yourself builds who you are becoming.</p>
    <button class="finish-btn" onclick="restart()">Start again &#8635;</button>
  </div>
</div>

let current = 0;
let dragX = 0, isDragging = false, startX = 0;
const CONF_COLS = ['#ff6b9d','#a855f7','#fccb90','#43e97b','#4facfe','#fa709a','#ff9a9e','#fee140'];

function buildCards() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';

  CARDS.forEach((data, i) => {
    const card = document.createElement('div');
    card.className = 'card ' + data.grad;
    card.id = 'card' + i;

    const illustSVG = ILLUSTRATIONS[data.illus] || '';

    let bodyHTML = '';
    if (data.body) {
      bodyHTML = `<div class="card-body">${data.body}</div>`;
    }

    let stepsHTML = '';
    if (data.steps) {
      stepsHTML = `<ul class="steps-list">` +
        data.steps.map((s,j) =>
          `<li><span class="step-num">${j+1}</span>${s.text}</li>`
        ).join('') +
      `</ul>`;
    }

    let affHTML = '';
    if (data.affirmation) {
      affHTML = `<div class="affirmation-box">${data.affirmation}</div>`;
    }

    card.innerHTML = `
      <div class="card-deco deco-a"></div>
      <div class="card-deco deco-b"></div>
      <div class="card-deco deco-c"></div>
      <div class="illus-wrap">${illustSVG}</div>
      <div class="card-eyebrow">${data.eyebrow}</div>
      <div class="card-title">${data.title}</div>
      ${bodyHTML}
      ${stepsHTML}
      ${affHTML}
      <button class="card-btn" onclick="advance()">${data.btn}</button>
    `;

    card.addEventListener('mousedown',  e => startDrag(e.clientX));
    card.addEventListener('touchstart', e => startDrag(e.touches[0].clientX), { passive:true });

    stack.appendChild(card);
  });

  updatePositions();
}

function updatePositions() {
  CARDS.forEach((d, i) => {
    const el = document.getElementById('card' + i);
    el.className = 'card ' + d.grad;
    if      (i < current)        el.classList.add('prev');
    else if (i === current)      el.classList.add('active');
    else if (i === current + 1)  el.classList.add('behind1');
    else if (i === current + 2)  el.classList.add('behind2');
    else                         el.classList.add('hidden');
  });

  const pct = ((current + 1) / CARDS.length) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progFill').style.background = CARDS[current].progressColor;
  document.getElementById('progLabel').textContent = (current + 1) + ' / ' + CARDS.length;
}

function advance() {
  current++;
  if (current >= CARDS.length) { showFinish(); return; }
  updatePositions();
}

function showFinish() {
  document.getElementById('mainStage').style.display = 'none';
  document.getElementById('finishStage').classList.add('show');
  burst(80);
  setTimeout(() => burst(50), 700);
}

function restart() {
  current = 0;
  document.getElementById('finishStage').classList.remove('show');
  document.getElementById('mainStage').style.display = 'flex';
  buildCards();
}

function startDrag(x) {
  isDragging = true;
  startX = x; dragX = 0;
  const el = document.getElementById('card' + current);
  if (el) el.classList.add('swiping');

  const onMove = cx => {
    if (!isDragging) return;
    dragX = cx - startX;
    const el = document.getElementById('card' + current);
    if (el) el.style.transform = `translateX(${dragX}px) rotate(${dragX * 0.04}deg)`;
  };

  const onUp = () => {
    isDragging = false;
    const el = document.getElementById('card' + current);
    if (el) { el.classList.remove('swiping'); el.style.transform = ''; }
    if (Math.abs(dragX) > 85) advance();
    window.removeEventListener('mousemove', mm);
    window.removeEventListener('touchmove', tm);
    window.removeEventListener('mouseup',   onUp);
    window.removeEventListener('touchend',  onUp);
  };

  const mm = e => onMove(e.clientX);
  const tm = e => onMove(e.touches[0].clientX);
  window.addEventListener('mousemove', mm);
  window.addEventListener('touchmove', tm, { passive:true });
  window.addEventListener('mouseup',   onUp);
  window.addEventListener('touchend',  onUp);
}

function burst(count = 60) {
  const box = document.getElementById('confBox');
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    const size = Math.random() * 11 + 5;
    c.style.cssText = `
      left:${Math.random()*100}%;top:-20px;
      width:${size}px;height:${size}px;
      background:${CONF_COLS[Math.floor(Math.random()*CONF_COLS.length)]};
      border-radius:${Math.random() > 0.45 ? '50%' : '2px'};
      animation-duration:${Math.random()*1.6+1}s;
      animation-delay:${Math.random()*0.5}s;
    `;
    box.appendChild(c);
    c.addEventListener('animationend', () => c.remove());
  }
}
